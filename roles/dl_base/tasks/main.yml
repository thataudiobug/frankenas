---
# tasks file for dl_base
- name: Update User + Robot Creds (lxc droplets)
  authorized_key:
    user: root
    key: "{{ users_enabled
             | select('in', users_catalog)
             | map('extract', users_catalog, 'key')
             | list
             | join('\n') }}"
    state: present
    exclusive: true
  when: ansible_facts['virtualization_type'] == "lxc"

- name: Update User Creds (qemu droplets)
  authorized_key:
    user: casey
    key: '{{ users_catalog.casey.key }}'
    state: present
    exclusive: true
  when: ansible_facts['virtualization_type'] == "qemu"

- name: Update Robot Creds (qemu droplets)
  authorized_key:
    user: robot
    key: '{{ users_catalog.robot.key }}'
    state: present
    exclusive: true
  when: ansible_facts['virtualization_type'] == "qemu"

- name: Update Apt Packages
  apt:
    name: "*"
    update_cache: true
    state: latest

- name: Ensure Python installed and available
  apt:
    name: ["python3"]
    state: latest

# Shared security baseline (SSH hardening, host firewall, unattended
# security upgrades). Guests are predictable Ubuntu droplets, so the
# firewall runs by default — except on vpn_clients hosts, where the
# dl_vpn_client kill switch owns nftables (co_hst_sec defers automatically).
# co_mgmt_cidr defaults to the OOB mgmt net in the role; override per
# host/group via normal vars if ever needed.
#- name: Apply the common host security baseline
#  ansible.builtin.include_role:
#    name: co_hst_sec

# Fleet-wide log shipping to the central Loki (Mollymauk) over OOB. No-op on
# the log server itself (co_log_enabled: false in its host_vars) to avoid a
# ship-to-self loop before Loki is up.
- name: Ship logs to the central aggregator
  ansible.builtin.include_role:
    name: co_hst_log
