---
# SSH hardening via a drop-in under /etc/ssh/sshd_config.d/.
#
# We never touch the stock /etc/ssh/sshd_config (Ubuntu 24.04 ships it with
# `Include /etc/ssh/sshd_config.d/*.conf` near the top). A drop-in keeps our
# changes isolated, idempotent, and trivially reversible (delete the file).
#
# The template is validated with `sshd -t -f %s` BEFORE the file is accepted,
# and the service is only reloaded (not restarted) via a handler — a reload
# re-reads config without dropping the existing connection that Ansible is
# riding on, so a surprise lockout can't strand us mid-play.

- name: Ensure sshd_config.d drop-in directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: "0755"

# `sshd -t` requires the privilege-separation directory /run/sshd, but on
# Ubuntu 24.04 ssh is socket-activated: each connection spawns a transient
# sshd unit with RuntimeDirectory=sshd, and systemd DELETES /run/sshd when
# that instance exits. So creating the dir in a separate task loses a race —
# Ansible's next connection spawns+exits an sshd instance that wipes it
# before the validate runs. The only reliable fix is to recreate the dir and
# run the test in ONE shell invocation (atomic), which Ansible's `validate:`
# can't do (no shell chaining). So we write the drop-in, then validate the
# full effective config in a single `mkdir -p ... && sshd -t` command, and
# roll the file back if it's bad.
- name: Install hardened sshd drop-in
  ansible.builtin.template:
    src: sshd_hardening.conf.j2
    dest: "/etc/ssh/sshd_config.d/{{ config_hardening_ssh_dropin_filename }}"
    owner: root
    group: root
    mode: "0644"
  register: _co_sshd_dropin
  notify: Reload sshd

- name: Validate the effective sshd config (rollback on failure)
  block:
    # mkdir + test in one invocation so the socket-activation race can't
    # delete /run/sshd between creating it and running sshd -t. `sshd -t`
    # (no -f) checks the FULL assembled config — stock file + every drop-in —
    # which is the real thing that will load, catching cross-file conflicts.
    - name: Test the assembled sshd configuration
      ansible.builtin.command:
        cmd: bash -c 'mkdir -p /run/sshd && chmod 0755 /run/sshd && sshd -t'
      changed_when: false
  rescue:
    # The new drop-in broke the effective config. Remove it so the running
    # sshd (still on the old, valid config — the reload handler hasn't fired)
    # isn't left a landmine on the next start, then fail loudly.
    - name: Remove the invalid sshd drop-in
      ansible.builtin.file:
        path: "/etc/ssh/sshd_config.d/{{ config_hardening_ssh_dropin_filename }}"
        state: absent

    - name: Fail because the hardened sshd config is invalid
      ansible.builtin.fail:
        msg: >-
          The rendered sshd drop-in produced an invalid effective
          configuration (sshd -t failed); the drop-in was removed and sshd
          left on its previous config. Check config_hardening_ssh_* vars.
