- name: Gather some facts
  service_facts:

- name: Check Dependancies
  apt:
    name: ["python3", "python3-requests"]

- name: DEBUG Check Var
  debug:
    var: ansible_facts.services['docker.service'].state

- name: Build Docker CE
  include_tasks: install_docker.yml
  when: ansible_facts.services['docker.service'].state != 'running'

- name: Deploy Containers
  import_tasks: deploy_containers.yml
