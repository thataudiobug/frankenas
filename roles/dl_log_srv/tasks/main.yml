---
# tasks file for dl_log_srv
#
# Prepares config + storage for the central Loki/Grafana stack on Mollymauk.
# The containers are deployed separately by the `docker` role (catalog
# entries loki + grafana). Sequence:
#   1. preflight (storage binds present, admin password changed)
#   2. create the Loki data dirs on the Nott bind
#   3. render loki-config.yaml (retention, compactor, filesystem store)
#   4. render Grafana datasource provisioning (Loki)
#   5. verify

# -- 1. Preflight ------------------------------------------------------
- name: Assert the Nott storage bind is mounted
  ansible.builtin.assert:
    that:
      - log_srv_data_root is defined
      - (log_srv_data_root | dirname) is mount or (log_srv_data_root | dirname == '/mnt/nott')
    fail_msg: >-
      Expected the Nott bind at /mnt/nott. Ensure Mollymauk enables the
      'nott' droplet_bind and pve_dl applied it before this role runs.
    quiet: true

- name: Refuse to run with the placeholder Grafana admin password
  ansible.builtin.assert:
    that:
      - log_srv_grafana_admin_password != "CHANGE_ME_IN_VAULT"
    fail_msg: >-
      log_srv_grafana_admin_password is still the placeholder. Set it from
      the vault before deploying Grafana.
    quiet: true

# -- 2. Storage dirs ---------------------------------------------------
- name: Create Loki data directories on the Nott bind
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    # Loki container runs as uid 10001 by default; align ownership so it can
    # write chunks on the bind.
    owner: "10001"
    group: "10001"
    mode: "0750"
  loop: "{{ log_srv_loki_dirs }}"

- name: Create config directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ log_srv_config_root }}"
    - "{{ log_srv_grafana_config_root }}/provisioning/datasources"

# -- 3. Loki config ----------------------------------------------------
- name: Render the Loki configuration
  ansible.builtin.template:
    src: loki-config.yaml.j2
    dest: "{{ log_srv_config_root }}/loki-config.yaml"
    owner: root
    group: root
    mode: "0644"
  notify: Recreate loki container

# -- 4. Grafana datasource provisioning --------------------------------
- name: Render the Grafana Loki datasource
  ansible.builtin.template:
    src: grafana-datasource.yaml.j2
    dest: "{{ log_srv_grafana_config_root }}/provisioning/datasources/loki.yaml"
    owner: root
    group: root
    mode: "0644"
  notify: Recreate grafana container

- name: Flush handlers so containers pick up new config before verify
  ansible.builtin.meta: flush_handlers

# -- 5. Verify ---------------------------------------------------------
- name: Verify the log server
  ansible.builtin.include_tasks: verify.yml
  when: log_srv_verify | bool
