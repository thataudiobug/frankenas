---
# Baseline host firewall: nftables `inet filter` table with a default-drop
# input policy and a small explicit allowlist (loopback, established, the
# management net for SSH, optional ICMP, and any operator-declared ports).
#
# This is the GENERIC baseline. Hosts that run the config_vpn_client kill switch
# are excluded by the config_firewall_enabled default, because that role owns
# /etc/nftables.conf with its own `flush ruleset` — two writers would fight.
#
# Same safety model as the kill switch: render -> validate with `nft -c`
# -> load atomically with `nft -f`. The output chain is intentionally left
# wide open (policy accept); this baseline restricts INGRESS only and is not
# an egress kill switch.

# -- Preflight: validate the allowlist before the drop policy is live --
- name: Assert firewall port rules are well-formed
  ansible.builtin.assert:
    that:
      - item.proto in ['tcp', 'udp']
      - item.port is defined
    fail_msg: >-
      Each firewall port rule needs proto (tcp|udp) and port. Offending
      entry: {{ item }}
    quiet: true
  loop: "{{ config_firewall_allow_ports_public + config_firewall_allow_ports_restricted }}"

- name: Assert restricted port rules carry a valid source CIDR
  ansible.builtin.assert:
    that:
      - item.cidr is defined
      - item.cidr | ansible.utils.ipaddr('net') is truthy
    fail_msg: >-
      config_firewall_allow_ports_restricted entries need a valid 'cidr'. Offending
      entry: {{ item }}
    quiet: true
  loop: "{{ config_firewall_allow_ports_restricted }}"

- name: Install nftables
  ansible.builtin.apt:
    name:
      - nftables
    state: present
    update_cache: true

- name: Render the baseline nftables ruleset (validated)
  ansible.builtin.template:
    src: baseline.nft.j2
    dest: "{{ config_firewall_conf_path }}"
    owner: root
    group: root
    mode: "0644"
    # Syntax/semantic check before the file is accepted. A ruleset that
    # drops our own SSH is the worst outcome, so never write an invalid one.
    validate: "nft -c -f %s"
  notify: Reload nftables

- name: Enable and start nftables
  ansible.builtin.systemd:
    name: nftables
    enabled: true
    state: started
  when: config_firewall_manage_service | bool

# Apply immediately rather than only on handler flush, so the host is
# protected within this task and a later failure can't leave it unfiltered.
# nft -f swaps the ruleset in one transaction (no open window).
- name: Apply the baseline ruleset now
  ansible.builtin.command:
    cmd: "nft -f {{ config_firewall_conf_path }}"
  changed_when: true

- name: Flush handlers so the ruleset reload lands before verification
  ansible.builtin.meta: flush_handlers
  when: config_firewall_verify | bool

- name: Verify the baseline nftables firewall
  ansible.builtin.include_tasks: verify_baseline.yml
  when: config_firewall_verify | bool
