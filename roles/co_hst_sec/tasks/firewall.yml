---
# Baseline host firewall: nftables `inet filter` table with a default-drop
# input policy and a small explicit allowlist (loopback, established, the
# management net for SSH, optional ICMP, and any operator-declared ports).
#
# This is the GENERIC baseline. Hosts that run the dl_vpn_client kill switch
# are excluded by the co_fw_enabled default, because that role owns
# /etc/nftables.conf with its own `flush ruleset` — two writers would fight.
#
# Same safety model as the kill switch: render -> validate with `nft -c`
# -> load atomically with `nft -f`. The output chain is intentionally left
# wide open (policy accept); this baseline restricts INGRESS only and is not
# an egress kill switch.

- name: Install nftables
  ansible.builtin.apt:
    name:
      - nftables
    state: present
    update_cache: true

- name: Render the baseline nftables ruleset (validated)
  ansible.builtin.template:
    src: baseline.nft.j2
    dest: "{{ co_fw_conf_path }}"
    owner: root
    group: root
    mode: "0644"
    # Syntax/semantic check before the file is accepted. A ruleset that
    # drops our own SSH is the worst outcome, so never write an invalid one.
    validate: "nft -c -f %s"
  notify: Reload nftables

- name: Enable and start nftables
  ansible.builtin.systemd:
    name: nftables
    enabled: true
    state: started
  when: co_fw_manage_service | bool

# Apply immediately rather than only on handler flush, so the host is
# protected within this task and a later failure can't leave it unfiltered.
# nft -f swaps the ruleset in one transaction (no open window).
- name: Apply the baseline ruleset now
  ansible.builtin.command:
    cmd: "nft -f {{ co_fw_conf_path }}"
  changed_when: true
