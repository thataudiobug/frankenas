---
# defaults file for provision_proxmox
platform: []

# =====================================================================
# Hardware / build catalogs (moved here from group_vars/pct in Phase 3).
#
# These drive LXC/QEMU creation. A host selects from each with the
# companion `<stem>_enabled` host_var. frankinception discovers them here
# (role defaults) and reads the `# pick one` / `# pick many` markers below.
# =====================================================================

compute_catalog:  # pick one
  small:
    cores: 2
    memory_mb: 2048
  medium:
    cores: 4
    memory_mb: 4096
  large:
    cores: 6
    memory_mb: 4096
  xl:
    cores: 8
    memory_mb: 8192

accelerator_catalog:  # pick one
  gpu: |
   'lxc.cgroup2.devices.allow: c 226:128 rwm
    lxc.mount.entry: /dev/dri/renderD128 dev/dri/renderD128 none bind,optional,create=file
    lxc.hook.pre-start: sh -c "chown 100000:100993 /dev/dri/renderD128"'

storage_catalog:  # pick one
  s8:
    disk_size_gb: 8
    disk_type: "caleb"
  s20:
    disk_size_gb: 20
    disk_type: "caleb"
  m8:
    disk_size_gb: 8
    disk_type: "nott"
  m24:
    disk_size_gb: 24
    disk_type: "nott"

os_catalog:  # pick one
  ubuntu:
    ct_template: "local:vztmpl/ubuntu-24.04-standard_24.04-2_amd64.tar.zst"

dns_catalog:  # pick one
  # Resolver config applied to the container at BUILD time (Proxmox sets the
  # LXC 'nameserver'/'searchdomain'), so the guest has working DNS from first
  # boot — before it ever runs apt. Pick one with `dns_enabled: <key>`.
  oob:
    # Normal hosts resolve through the OOB dnsmasq server.
    nameserver: "10.128.0.2 1.1.1.1 8.8.8.8"
    searchdomain: "oob.frankenas.lan"
  public:
    # Bootstrap profile: public resolvers. Used by the dnsmasq server itself
    # (it can't resolve through itself before dnsmasq is up) and by anything
    # that must resolve before the OOB DNS exists.
    nameserver: "1.1.1.1 8.8.8.8"
    searchdomain: "frankenas.com"

network_catalog:  # pick many
  wan:
    bridge: "vmbr1"
    ip: dhcp
    # firewall: 1 turns on Proxmox firewalling for THIS NIC. The
    # config_firewall role renders the guest's DROP-by-default ingress
    # policy, enforced on the host side of this veth (a compromised guest
    # can't bypass it). WAN ingress is the only thing filtered — see the oob
    # NIC below.
    firewall: 0
  oob:
    bridge: "vmbr0"
    # network: "10.128.0."    # octet prefix for 'host: <octet>' overrides
    # subnet: "9"
    # oob: true marks this as the out-of-band management network. It is the
    # connection NIC the C2 box reaches each host on. The NIC now leases its
    # address by default (ip: dhcp) and dnsmasq auto-registers the lease as
    # <hostname>.oob.frankenas.lan. A host that supplies a static ip/host
    # override on the oob network forces a static address instead (the
    # static anchors pve/dl-dns-srv/c2 do this). ip: dhcp replaces the old
    # ip: "{{ ansible_host }}" because ansible_host is now an FQDN, which
    # would template to a hostname rather than an IP. It has no gateway —
    # the default route belongs to the WAN NIC.
    oob: true
    ip: dhcp                 # CHANGED: lease by default; static ip/host overrides win
    # firewall: 0 leaves this NIC UNFILTERED. This is the lockout safety
    # net: management traffic (SSH/Ansible/Proxmox API over 10.128.0.0/9)
    # bypasses the guest firewall entirely, so a bad config_firewall profile
    # can never strand the box. Keep this 0.
    firewall: 0
