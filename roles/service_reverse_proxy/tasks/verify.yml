---
# Verification for service_reverse_proxy. Confirms the snippets exist and Authelia's
# forward-auth endpoint is reachable from the proxy host over OOB.

- name: Confirm the Authelia snippets were rendered
  ansible.builtin.stat:
    path: "{{ service_reverse_proxy_npm_data_path }}/{{ service_reverse_proxy_snippets_subdir }}/{{ item }}"
  register: _rp_snips
  loop:
    - authelia-authrequest.conf
    - authelia-location.conf

- name: Assert both snippets exist
  ansible.builtin.assert:
    that:
      - item.stat.exists
    fail_msg: "Authelia snippet {{ item.item }} was not rendered."
    quiet: true
  loop: "{{ _rp_snips.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Probe Authelia's forward-auth endpoint over OOB
  ansible.builtin.uri:
    url: "{{ service_reverse_proxy_authelia_internal_url }}/api/health"
    status_code: [200]
    timeout: 10
  register: _rp_authelia
  failed_when: false
  changed_when: false

- name: Warn if Authelia is unreachable from the proxy host
  ansible.builtin.debug:
    msg: >-
      WARNING: the proxy host could not reach Authelia at
      {{ service_reverse_proxy_authelia_internal_url }} (status
      {{ _rp_authelia.status | default('no response') }}). Forward-auth will
      fail closed (401) for protected hosts until this path is up. Check
      Orthax and the identity firewall rule for :9091.
  when: _rp_authelia.status | default(0) != 200

- name: Summarise reverse-proxy verification
  ansible.builtin.debug:
    msg:
      - "snippets rendered: {{ _rp_snips.results | map(attribute='stat.exists') | list }}"
      - "authelia reachable: {{ _rp_authelia.status | default('unreachable') }}"
