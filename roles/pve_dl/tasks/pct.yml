- name: Build New Proxmox Containers
  community.proxmox.proxmox:
    node: pve
    api_user: robot@pam
    api_host: 192.168.1.100
    api_token_id: "{{ api_catalog.pve_api.id }}"
    api_token_secret: "{{ api_catalog.pve_api.key }}"
    hostname: '{{ inventory_hostname }}'
    ostemplate: "{{ os_catalog[os_enabled]['ct_template'] }}"
    cores: "{{ compute_catalog[compute_enabled]['cores'] }}"
    memory: "{{ compute_catalog[compute_enabled]['memory_mb'] }}"
    disk_volume:
      storage: "{{ storage_catalog[storage_enabled]['disk_type'] }}"
      size: "{{ storage_catalog[storage_enabled]['disk_size_gb'] }}"
    pubkey: "{{ users_enabled
        | select('in', users_catalog)
        | map('extract', users_catalog, 'key')
        | list
        | join('\n') }}"
    netif: "{{ pct_netif }}"
    # Resolver set at build time (catalog -> enabled) so the guest has
    # working DNS from first boot, before it runs apt. `dns_enabled` names a
    # dns_catalog entry; the dnsmasq server picks 'public' (it can't resolve
    # through itself before it's up), everything else picks 'oob'.
    nameserver: "{{ _dns_cfg.nameserver | default(omit) }}"
    searchdomain: "{{ _dns_cfg.searchdomain | default(omit) }}"
    features:
      - "nesting=1"
    state: present
  register: was_built
  #when: does_vm.proxmox_vms[0] is not defined

- name: Remove Stale known_hosts Entries for Rebuilt Container
  command: ssh-keygen -R "{{ item }}"
  loop:
    - "{{ inventory_hostname }}"
    - "{{ ansible_host }}"
  delegate_to: localhost
  changed_when: false
  failed_when: false

- name: Stamp the build description (only on a fresh build)
  community.proxmox.proxmox:
    node: pve
    api_user: robot@pam
    api_host: 192.168.1.100
    api_token_id: "{{ api_catalog.pve_api.id }}"
    api_token_secret: "{{ api_catalog.pve_api.key }}"
    hostname: '{{ inventory_hostname }}'
    vmid: "{{ was_built.vmid }}"
    description: "Last rebuilt by script at {{ now() | string }}"
    state: present
  when: was_built.changed

- name: Wait for the container config to register on pve
  ansible.builtin.wait_for:
    path: "/etc/pve/lxc/{{ was_built.vmid }}.conf"
    state: present
    timeout: 60
    sleep: 2
  delegate_to: pve
  # The provisioning play runs connection: local, and that play-level setting
  # otherwise leaks into delegated tasks — they'd run on the control node
  # instead of SSHing to pve (where /etc/pve and pct actually live). Force
  # SSH so this genuinely executes on the hypervisor.
  connection: ssh
  when: was_built is changed

# Bind mounts (resolved_mounts from build_mounts.yml) can't go through the
# Proxmox API build call — the API rejects binding arbitrary host paths.
# They're applied with `pct set` ON the pve node instead. Each entry becomes
#   pct set <vmid> --mpN <host_path>,mp=<mountpoint>[,<opt>=<val>...]
# Set before the container starts so the mounts are present on first boot.
# Idempotent: we read the current config and skip mounts already configured
# with the same value, so re-runs don't report spurious changes.
- name: Read current container config (for mount idempotency)
  ansible.builtin.command:
    cmd: "/usr/sbin/pct config {{ was_built.vmid }}"
  register: pct_current_config
  changed_when: false
  delegate_to: pve
  connection: ssh   # see note above; run on pve, not the control node
  when: resolved_mounts | default([]) | length > 0

- name: Configure bind mounts on the PVE host
  ansible.builtin.command:
    cmd: >-
      /usr/sbin/pct set {{ was_built.vmid }}
      --{{ item.id }} {{ mount_value }}
  loop: "{{ resolved_mounts | default([]) }}"
  loop_control:
    label: "{{ item.id }} -> {{ item.mountpoint }}"
  delegate_to: pve
  connection: ssh   # see note above; run on pve, not the control node
  vars:
    # pct mp value: <host_path>,mp=<guest_path>[,opt=val...]. Bind mounts use
    # the host directory directly as the "volume". Extra options (ro, backup,
    # …) come from the catalog entry via build_mounts.yml.
    mount_value: >-
      {{ item.host_path }},mp={{ item.mountpoint }}{% for k, v in (item.options | default({})).items() %},{{ k }}={{ v }}{% endfor %}
  register: pct_set_mounts
  # Only set when the desired "mpN: <value>" line isn't already present in
  # the live config. pct config renders the volume and options on one line.
  changed_when: pct_set_mounts.rc == 0
  when:
    - resolved_mounts | default([]) | length > 0
    - "(item.id ~ ': ' ~ mount_value) not in (pct_current_config.stdout | default(''))"

- name: Add GPU Mappings
  community.proxmox.proxmox:
    node: pve
    api_user: robot@pam
    api_host: 192.168.1.100
    api_token_id: "{{ api_catalog.pve_api.id }}"
    api_token_secret: "{{ api_catalog.pve_api.key }}"
    hostname: '{{ inventory_hostname }}'
    vmid: "{{ was-built.vmid }}"
    features:
      - "nesting=1"
      - "lxc.cgroup2.devices.allow: c 226:128 rwm"
      - "lxc.mount.entry: /dev/dri/renderD128 dev/dri/renderD128 none bind,optional,create=file"
      - 'lxc.hook.pre-start: sh -c \"chown 100000:100993 /dev/dri/renderD128\"'
    state: present
  when: gpu_enabled is true

# -- TUN device passthrough + gluetun config (in-guest VPN sidecar) ----
#
# Inferred, not flagged: a host that is BOTH a pct guest AND in vpn_clients
# runs a gluetun sidecar, which builds its own tunnel inside the guest and
# therefore needs /dev/net/tun + NET_ADMIN. In an unprivileged LXC that
# device only exists if mapped in from the PVE host. Done BEFORE start so
# it's present on first boot.
#
# NOTE: /etc/pve/lxc/<vmid>.conf lives on pmxcfs, which strips comment lines
# its parser doesn't recognise — so blockinfile markers get eaten and the
# block re-appends every run. lineinfile matches the literal config key
# instead, staying idempotent with no markers to lose. (Moved here from the
# deprecated dl_vpn_client role.)
- name: Add tun device mappings for the container
  ansible.builtin.lineinfile:
    path: "/etc/pve/lxc/{{ was_built.vmid }}.conf"
    line: "{{ item }}"
    state: present
  loop:
    - "lxc.cgroup2.devices.allow: c 10:200 rwm"
    - "lxc.mount.entry: /dev/net dev/net none bind,create=dir"
  delegate_to: pve
  connection: ssh
  when: "'vpn_clients' in group_names"
  register: pct_tun_added

- name: Chown the tun device for the container's mapped root
  ansible.builtin.file:
    path: /dev/net/tun
    owner: 100000
    group: 100000
  delegate_to: pve
  connection: ssh
  when: "'vpn_clients' in group_names"

# Write gluetun's custom OpenVPN config (if the selected provider supplies
# one) to the config bind so the gluetun container finds it at
# /gluetun/custom.ovpn. Written to the bind SOURCE on the PVE host (same
# place the bind mount points at), delegated to pve like the tun tasks.
# Skipped cleanly when the provider has no custom_ovpn (built-in providers).
- name: Resolve the selected VPN provider's custom OpenVPN config
  ansible.builtin.set_fact:
    _gluetun_custom_ovpn: "{{ vpn_provider_catalog[vpn_provider_enabled].custom_ovpn | default('') }}"
  when:
    - "'vpn_clients' in group_names"
    - vpn_provider_enabled is defined
    - vpn_provider_catalog is defined

- name: Write gluetun custom OpenVPN config to the config bind
  when:
    - "'vpn_clients' in group_names"
    - _gluetun_custom_ovpn | default('') | length > 0
  delegate_to: pve
  connection: ssh
  block:
    - name: Ensure the gluetun config dir exists on the bind source
      ansible.builtin.file:
        path: "{{ droplet_bind_catalog.config.src }}/gluetun"
        state: directory
        owner: root
        group: root
        mode: "0750"

    - name: Write the custom.ovpn file
      ansible.builtin.copy:
        content: "{{ _gluetun_custom_ovpn }}"
        dest: "{{ droplet_bind_catalog.config.src }}/gluetun/custom.ovpn"
        owner: root
        group: root
        mode: "0600"
      no_log: true   # vault-sourced .ovpn content

- name: Start Container
  community.proxmox.proxmox:
    node: pve
    api_user: robot@pam
    api_host: 192.168.1.100
    api_token_id: "{{ api_catalog.pve_api.id }}"
    api_token_secret: "{{ api_catalog.pve_api.key }}"
    hostname: '{{ inventory_hostname }}'
    state: started
  register: was_started

- name: Wait for Container to Become Available
  wait_for:
    host: "{{ ansible_host }}"
    port: 22
    timeout: 30
  delegate_to: localhost

# Hypervisor-enforced firewall. Runs after the container exists (was_built.vmid
# is in scope) so pve_fw can render /etc/pve/firewall/<vmid>.fw on the node.
# No-op for guests that don't set firewall_enabled. Ingress is enforced on the
# host side of the veth, so it doesn't matter that the guest is already up.
- name: Apply hypervisor-enforced guest firewall
  ansible.builtin.include_role:
    name: pve_fw
