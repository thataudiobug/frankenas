---
# Per-platform SSH key distribution.
#
# LXC droplets log in as root (keys come from the users_catalog/enabled
# framework); qemu droplets carry the casey + robot users instead. Keyed off
# the discovered virtualization_type. Baremetal key management is currently
# handled at bootstrap (the old hst_base did no key sync), so it is left out
# here to preserve prior behaviour — revisit if the PVE node should pull keys
# from users_catalog too.

- name: Update user + robot creds (lxc droplets)
  ansible.builtin.authorized_key:
    user: root
    key: "{{ users_enabled
             | select('in', users_catalog)
             | map('extract', users_catalog, 'key')
             | list
             | join('\n') }}"
    state: present
    exclusive: true
  when: ansible_facts['virtualization_type'] == "lxc"

- name: Update user creds (qemu droplets)
  ansible.builtin.authorized_key:
    user: casey
    key: "{{ users_catalog.casey.key }}"
    state: present
    exclusive: true
  when: ansible_facts['virtualization_type'] == "qemu"

- name: Update robot creds (qemu droplets)
  ansible.builtin.authorized_key:
    user: robot
    key: "{{ users_catalog.robot.key }}"
    state: present
    exclusive: true
  when: ansible_facts['virtualization_type'] == "qemu"
