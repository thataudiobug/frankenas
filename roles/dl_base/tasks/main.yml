---
# tasks file for dl_base
- name: Update User + Robot Creds (lxc droplets)
  authorized_key:
    user: root
    key: "{{ users_enabled
             | select('in', users_catalog)
             | map('extract', users_catalog, 'pub_key')
             | list
             | join('\n') }}"
    state: present
    exclusive: true
  when: ansible_facts['virtualization_type'] == "lxc"

- name: Update User Creds (qemu droplets)
  authorized_key:
    user: casey
    key: '{{ users_catalog.casey.pub_key }}'
    state: present
    exclusive: true
  when: ansible_facts['virtualization_type'] == "qemu"

- name: Update Robot Creds (qemu droplets)
  authorized_key:
    user: robot
    key: '{{ users_catalog.robot.pub_key }}'
    state: present
    exclusive: true
  when: ansible_facts['virtualization_type'] == "qemu"

- name: Update Apt Packages
  apt:
    name: "*"
    update_cache: true
    state: latest

- name: Ensure Python installed and available
  apt:
    name: ["python3"]
    state: latest
