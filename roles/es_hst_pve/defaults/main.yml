---
# defaults file for es_hst_pve
#
# es_hst_pve hardens the Proxmox VE *node* itself (baremetal host concerns,
# not guest provisioning — that's pve_dl). Two jobs:
#
#   1. Enable the DATACENTER (cluster-wide) firewall master switch. Until
#      this is on, every per-guest .fw file rendered by pve_fw is inert.
#   2. Harden the node's own firewall so management surfaces (Proxmox web UI
#      :8006, SSH, the API) are reachable ONLY over the OOB network, while
#      WAN-facing exposure is denied by default.
#
# SSH hardening + unattended upgrades for the node come from co_hst_sec via
# hst_base (PVE is a host), so they are NOT duplicated here.

# -- Management vs WAN segments ----------------------------------------
# OOB management network — the ONLY place the node's mgmt surfaces are
# reachable. SSH/API/web UI are allowed from here and nowhere else.
pve_node_mgmt_cidr: "10.128.0.0/9"
# WAN service network the cluster faces. Documented for clarity; the node's
# own services are not exposed here.
pve_node_wan_cidr: "10.0.0.0/9"

# -- Datacenter (cluster) firewall master switch -----------------------
# Turning this on enables firewalling cluster-wide. Proxmox keeps sane
# built-in defaults (it won't cut your current SSH/web session), but read
# the README before flipping on a live cluster. Set the input policy for
# the cluster; DROP is the secure default once the mgmt rules below exist.
pve_dc_firewall_enable: true
pve_dc_policy_in: "DROP"
pve_dc_policy_out: "ACCEPT"

# -- Node management surfaces (allowed from OOB only) ------------------
# Ports opened to pve_node_mgmt_cidr on the node's host firewall.
pve_node_mgmt_ports:
  - { proto: tcp, port: 22, comment: "SSH (OOB only)" }
  - { proto: tcp, port: 8006, comment: "Proxmox web UI / API (OOB only)" }
  - { proto: tcp, port: 3128, comment: "SPICE proxy (OOB only)" }
  - { proto: tcp, port: "5900:5999", comment: "VNC console (OOB only)" }

# Cluster/corosync links to allow between nodes (single-node today, but
# pinned so adding a node later doesn't silently break the cluster). Empty
# by default; populate with peer CIDRs if you cluster.
pve_node_cluster_peers: []

# Re-check applied state at the end of the run.
pve_node_verify: true
