---
# Parse endpoint(s) out of the selected .ovpn file and resolve them to
# IP-based firewall bootstrap rules.
#
# OpenVPN endpoint grammar we handle:
#   remote <host> [port] [proto]      one or more lines (failover list)
#   port <n>                          global default port
#   proto <udp|tcp|tcp-client>        global default proto
#   proto-force <udp|tcp>             global override
#
# Per-remote port/proto win over the globals. OpenVPN's default port is
# 1194 and default proto is udp when nothing is specified.
#
# Output: ``vpn_endpoint_rules`` — a list of {ip, port, proto} dicts that
# the kill switch turns into bootstrap accept rules.

- name: Split the .ovpn into lines
  ansible.builtin.set_fact:
    _ovpn_lines: >-
      {{
        vpn_ovpn_config.splitlines()
        | map('regex_replace', '#.*$', '')
        | map('trim')
        | select('ne', '')
        | list
      }}

- name: Extract global port directive (if any)
  ansible.builtin.set_fact:
    _ovpn_global_port: >-
      {{
        (_ovpn_lines
          | select('match', '^port\s+\d+')
          | map('regex_replace', '^port\s+(\d+).*$', '\1')
          | list
          | last) | default('1194', true)
      }}

- name: Extract global proto directive (if any)
  ansible.builtin.set_fact:
    _ovpn_global_proto: >-
      {{
        (_ovpn_lines
          | select('match', '^(proto|proto-force)\s+')
          | map('regex_replace', '^(?:proto|proto-force)\s+(\S+).*$', '\1')
          | map('regex_replace', '^tcp.*$', 'tcp')
          | list
          | last) | default('udp', true)
      }}

- name: Collect the raw remote lines
  ansible.builtin.set_fact:
    _ovpn_remotes: >-
      {{
        _ovpn_lines
        | select('match', '^remote\s+\S+')
        | list
      }}

- name: Fail if the .ovpn has no remote line
  ansible.builtin.assert:
    that:
      - _ovpn_remotes | length > 0
    fail_msg: >-
      The selected .ovpn ('{{ ovpn_server_enabled }}') contains no
      'remote' directive, so the endpoint can't be determined.
    quiet: true

# Build a normalised list of {host, port, proto} from each remote line.
# OpenVPN's remote grammar is positional: `remote <host> [port] [proto]`,
# so parts[2] (if present) is always the port and parts[3] (if present)
# is always the proto. Missing values fall back to the global directives.
- name: Normalise each remote into host/port/proto
  ansible.builtin.set_fact:
    _ovpn_endpoints: >-
      {{
        _ovpn_endpoints | default([]) + [{
          'host': parts[1],
          'port': (parts[2] if (parts | length > 2) else _ovpn_global_port),
          'proto': ((parts[3] if (parts | length > 3) else _ovpn_global_proto) | regex_replace('^tcp.*$', 'tcp'))
        }]
      }}
  loop: "{{ _ovpn_remotes }}"
  vars:
    parts: "{{ item.split() }}"
  loop_control:
    label: "{{ item }}"

- name: Show parsed endpoints
  ansible.builtin.debug:
    var: _ovpn_endpoints

# Resolve each endpoint host to IPv4 address(es). A single 'remote' may
# resolve to multiple A records; we keep them all so failover works.
- name: Resolve endpoint hosts to firewall rules
  ansible.builtin.set_fact:
    vpn_endpoint_rules: >-
      {{
        vpn_endpoint_rules | default([]) + (
          lookup('community.general.dig', item.host, wantlist=True)
          | map('string')
          | select('match', '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$')
          | map('community.general.dict_kv', 'ip')
          | map('combine', {'port': item.port | int, 'proto': item.proto})
          | list
        )
      }}
  loop: "{{ _ovpn_endpoints }}"
  loop_control:
    label: "{{ item.host }}:{{ item.port }}/{{ item.proto }}"
  when: vpn_endpoint_rules_override | length == 0

- name: Use manual endpoint rule override
  ansible.builtin.set_fact:
    vpn_endpoint_rules: "{{ vpn_endpoint_rules_override }}"
  when: vpn_endpoint_rules_override | length > 0

- name: Deduplicate endpoint rules
  ansible.builtin.set_fact:
    vpn_endpoint_rules: "{{ vpn_endpoint_rules | unique }}"

- name: Fail if no endpoint IPs were resolved
  ansible.builtin.assert:
    that:
      - vpn_endpoint_rules | length > 0
    fail_msg: >-
      Could not resolve any IPv4 address for the .ovpn remote(s). The kill
      switch would block OpenVPN from connecting. Set
      vpn_endpoint_rules_override if DNS is unavailable from the control node.
    quiet: true

- name: Show resolved firewall bootstrap rules
  ansible.builtin.debug:
    var: vpn_endpoint_rules
