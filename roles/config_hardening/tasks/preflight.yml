---
# Preflight for SSH hardening: validate the inputs that, if wrong, would lock
# us out. Cheap to run, and far better than discovering a bad CIDR after a
# hardened sshd reload.

- name: Assert the management CIDR is set and parses as a network
  ansible.builtin.assert:
    that:
      - config_hardening_mgmt_cidr | length > 0
      - config_hardening_mgmt_cidr | ansible.utils.ipaddr('net') is truthy
    fail_msg: >-
      config_hardening_mgmt_cidr ('{{ config_hardening_mgmt_cidr | default("") }}') must be a valid CIDR
      (e.g. 10.128.0.0/9). C2/Ansible reaches SSH from here — an empty or
      wrong value risks locking out management.
    quiet: true

- name: Assert any extra admin CIDRs parse as networks
  ansible.builtin.assert:
    that:
      - item | ansible.utils.ipaddr('net') is truthy
    fail_msg: "config_hardening_admin_extra_cidrs entry '{{ item }}' is not a valid CIDR."
    quiet: true
  loop: "{{ config_hardening_admin_extra_cidrs }}"
