---
# tasks file for es_hst_pve
#
# Hardens the Proxmox node: enables the cluster firewall master switch and
# restricts the node's management surfaces (web UI :8006, SSH, API) to the
# OOB network. Runs directly on the pve host.
#
# Sequence:
#   1. preflight (don't lock ourselves out of the web UI / SSH)
#   2. render the datacenter cluster.fw (master switch + cluster policy)
#   3. render the node host.fw (mgmt surfaces from OOB only)
#   4. compile + reload, then verify

- name: Preflight — assert the OOB management CIDR is sane
  ansible.builtin.assert:
    that:
      - pve_node_mgmt_cidr | length > 0
      - pve_node_mgmt_cidr | ansible.utils.ipaddr('net') is truthy
    fail_msg: >-
      pve_node_mgmt_cidr ('{{ pve_node_mgmt_cidr | default("") }}') must be a
      valid CIDR. The node's SSH + web UI are allowlisted from here before
      the DROP policy — a wrong value locks you out of Proxmox entirely.
    quiet: true

- name: Preflight — assert SSH (22) is among the allowed mgmt ports
  ansible.builtin.assert:
    that:
      - pve_node_mgmt_ports | selectattr('port', 'equalto', 22) | list | length > 0
    fail_msg: >-
      pve_node_mgmt_ports must include tcp/22, or this play will drop the
      very SSH connection Ansible rides on once the node policy goes DROP.
    quiet: true

- name: Ensure the Proxmox firewall config directory exists
  ansible.builtin.file:
    path: /etc/pve/firewall
    state: directory
    owner: root
    group: root
    mode: "0755"

# -- Datacenter (cluster-wide) firewall --------------------------------
- name: Render the datacenter firewall config (cluster.fw)
  ansible.builtin.template:
    src: cluster.fw.j2
    dest: /etc/pve/firewall/cluster.fw
    owner: root
    group: root
    mode: "0640"
  notify: Reload pve-firewall

# -- Node (host) firewall ----------------------------------------------
- name: Render the node firewall config (host.fw)
  ansible.builtin.template:
    src: host.fw.j2
    dest: "/etc/pve/nodes/{{ inventory_hostname }}/host.fw"
    owner: root
    group: root
    mode: "0640"
  notify: Reload pve-firewall

# pve-firewall has no staged-file check (it compiles the live config), so we
# compile AFTER writing and fail loudly on error. pve-firewall will not push
# a broken ruleset — it keeps the last good one — so a bad render fails here
# rather than silently dropping management traffic.
- name: Compile the firewall config to catch errors
  ansible.builtin.command:
    cmd: pve-firewall compile
  changed_when: false

- name: Flush handlers so the reload lands before verification
  ansible.builtin.meta: flush_handlers

- name: Verify the node firewall posture
  ansible.builtin.include_tasks: verify.yml
  when: pve_node_verify | bool
