ansible_host: port-tortuga.oob.frankenas.lan   # was 192.168.1.104
os_enabled: "ubuntu"

docker_groups_enabled:
  piracy:

docker_containers_overrides:

gpu_enabled: false
compute_enabled: "small"
accelerator_enabled: "false"
storage_enabled: "s8"
network_enabled:
  wan:        # default route + internet
  oob:        # connection NIC, DHCP lease, auto-registered A record


users_enabled: [casey, robot]
droplet_bind_enabled:
  media:
  config:
dns_enabled: oob

# VPN now runs as a gluetun docker sidecar (not host OpenVPN). The host only
# needs /dev/net/tun passed through from the PVE host for gluetun to build
# its tunnel; pve_dl provisions it when this is true.
pct_needs_tun: true

# Gluetun VPN provider selection (catalog -> enabled). Names an entry in
# vpn_provider_catalog (group_vars/vpn_clients); that entry supplies the
# gluetun provider env + vault credentials. TUI-manageable.
vpn_provider_enabled: ca_toronto
# Optional: subnets allowed out past gluetun's kill switch (so the qbit web
# UI stays reachable from OOB even if the tunnel drops). Defaults to the OOB
# mgmt net in the catalog, so this is only needed to override.
# vpn_outbound_subnets: "10.128.0.0/9"

# Log shipping: docker container logs (piracy stack). journald ships
# automatically.
log_sources_enabled: [docker]
