---
# In-guest VPN sidecar (gluetun) host-side prep, split out of pct.yml.
#
# Included from pct.yml BEFORE the container is started, and only for hosts in
# the vpn_clients group (the include carries that `when`, so it's applied to
# every task here — no need to repeat it per task).
#
# Why this lives at the hypervisor/build layer at all: a host that is both a
# pct guest AND in vpn_clients runs a gluetun sidecar container, which builds
# its own tunnel INSIDE the guest and therefore needs /dev/net/tun +
# NET_ADMIN. In an unprivileged LXC that device only exists if it's mapped in
# from the PVE host, and the custom .ovpn (for custom providers) has to be
# placed on the config bind with the right mapped ownership. Both are host-
# side actions that must happen before first boot — so they belong here, not
# in the in-guest service config.

# NOTE: /etc/pve/lxc/<vmid>.conf lives on pmxcfs, which strips comment lines
# its parser doesn't recognise — so blockinfile markers get eaten and the
# block re-appends every run. lineinfile matches the literal config key
# instead, staying idempotent with no markers to lose. (Moved here from the
# deprecated dl_vpn_client role.)
- name: Add tun device mappings for the container
  ansible.builtin.lineinfile:
    path: "/etc/pve/lxc/{{ _pct_vmid }}.conf"
    line: "{{ item }}"
    state: present
  loop:
    - "lxc.cgroup2.devices.allow: c 10:200 rwm"
    - "lxc.mount.entry: /dev/net dev/net none bind,create=dir"
  delegate_to: pve
  connection: ssh
  # _pct_vmid is undefined for a not-yet-built guest in --check; skip then.
  when: _pct_vmid is defined
  register: pct_tun_added

- name: Chown the tun device for the container's mapped root
  ansible.builtin.file:
    path: /dev/net/tun
    owner: 100000
    group: 100000
  delegate_to: pve
  connection: ssh

# Write gluetun's custom OpenVPN config (if the selected provider supplies
# one) to the config bind so the gluetun container finds it at
# /gluetun/custom.ovpn. Written to the bind SOURCE on the PVE host (same
# place the bind mount points at), delegated to pve like the tun tasks.
# Skipped cleanly when the provider has no custom_ovpn (built-in providers).
- name: Resolve the selected VPN provider's custom OpenVPN config
  ansible.builtin.set_fact:
    _gluetun_custom_ovpn: "{{ vpn_provider_catalog[vpn_provider_enabled].custom_ovpn | default('') }}"
  when:
    - vpn_provider_enabled is defined
    - vpn_provider_catalog is defined

- name: Write gluetun custom OpenVPN config to the config bind
  when:
    - _gluetun_custom_ovpn | default('') | length > 0
  delegate_to: pve
  connection: ssh
  block:
    # Ownership note: this is an UNPRIVILEGED LXC, so the guest's uid/gid 0
    # (root, which gluetun runs as) maps to 100000:100000 on the PVE host.
    # Files written as PVE-root (0:0) appear as `nobody` inside the guest and
    # gluetun can't read its own config -> tunnel fails -> "gluetun
    # unhealthy". Owning these as 100000:100000 on PVE makes them root-owned
    # (0:0) inside the container. Same +100000 offset the tun-device chown
    # and GPU render-node mapping use in pct.yml.
    - name: Ensure the gluetun config dir exists on the bind source
      ansible.builtin.file:
        path: "{{ droplet_bind_catalog.config.src }}/gluetun"
        state: directory
        owner: "100000"
        group: "100000"
        mode: "0750"

    - name: Write the custom.ovpn file
      ansible.builtin.copy:
        content: "{{ _gluetun_custom_ovpn }}"
        dest: "{{ droplet_bind_catalog.config.src }}/gluetun/custom.ovpn"
        owner: "100000"
        group: "100000"
        mode: "0600"
      no_log: true   # vault-sourced .ovpn content
