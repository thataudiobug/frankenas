---
# tasks file for service_lldap
#
# Prepares storage for LLDAP and verifies the directory. The container
# itself (env-configured) is deployed by the `docker` role. Sequence:
#   1. preflight (config bind present, secrets set)
#   2. create the LLDAP data dir on the bind
#   3. verify the directory answers

# -- 1. Preflight ------------------------------------------------------
- name: Assert the config bind is available
  ansible.builtin.assert:
    that:
      - service_lldap_data_root is defined
      - (service_lldap_data_root | dirname) == '/mnt/config'
    fail_msg: >-
      Expected the config bind at /mnt/config. Ensure Orthax enables the
      'config' droplet_bind and provision_proxmox applied it before this role runs.
    quiet: true

- name: Refuse to run with placeholder LLDAP secrets
  ansible.builtin.assert:
    that:
      - service_lldap_jwt_secret != "CHANGE_ME_VAULT"
      - service_lldap_key_seed != "CHANGE_ME_VAULT"
      - service_lldap_admin_password != "CHANGE_ME_VAULT"
      - service_lldap_bind_password != "CHANGE_ME_VAULT"
    fail_msg: >-
      One or more LLDAP secrets is still the placeholder. Set
      service_lldap_jwt_secret, service_lldap_key_seed, service_lldap_admin_password and
      service_lldap_bind_password from the vault.
    quiet: true

# -- 2. Storage --------------------------------------------------------
- name: Create the LLDAP data directory on the config bind
  ansible.builtin.file:
    path: "{{ service_lldap_data_root }}"
    state: directory
    # LLDAP container defaults to uid/gid 1000.
    owner: "1000"
    group: "1000"
    mode: "0750"

# -- 3. Verify ---------------------------------------------------------
- name: Verify the LLDAP directory
  ansible.builtin.include_tasks: verify.yml
  when: service_lldap_verify | bool
