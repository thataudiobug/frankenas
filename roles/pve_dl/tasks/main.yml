---
# tasks file for pve_dl
- name: Provision Proxmox Containers
  include_tasks: pct.yml
  when: "'pct' in group_names"

- name: Provision Proxmox VMs
  include_tasks: qemu.yml
  when: "'qemu' in group_names"

- name: Not a Proxmox Dropplet.
  debug:
    msg: "Skipping Virtual Platform Deployment"
  when: "'pct' not in group_names and 'qemu' not in group_names"
