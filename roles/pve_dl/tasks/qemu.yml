---
# tasks file for pve_dl qemu
#
# QEMU VMs express networking in two parts (unlike LXC's single netif):
#   * net<n>      — the virtual NIC hardware (model + bridge), e.g.
#                   "virtio,bridge=vmbr1"
#   * ipconfig<n> — cloud-init IP config for that NIC, e.g.
#                   "ip=192.168.1.103/24,gw=192.168.1.254"
# Both are keyed by the same index, so net0 pairs with ipconfig0.

- name: Build the QEMU net (NIC hardware) mapping from resolved networks
  ansible.builtin.set_fact:
    qemu_net: >-
      {{
        qemu_net | default({}) | combine({
          'net' ~ item.index: ('virtio,bridge=' ~ item.props.bridge)
        })
      }}
  loop: "{{ resolved_networks }}"
  loop_control:
    label: "net{{ item.index }} ({{ item.key }})"

# cloud-init ipconfig is a separate namespace from the netif hardware line,
# so (unlike LXC) we can't just join props. We pull ip + gw from props:
# DHCP NICs use ip=dhcp; static NICs pass their ip (already ip/subnet) and
# gw if the NIC carries one.
- name: Build the QEMU ipconfig (cloud-init) mapping from resolved networks
  ansible.builtin.set_fact:
    qemu_ipconfig: >-
      {{
        qemu_ipconfig | default({}) | combine({
          'ipconfig' ~ item.index: (
            'ip=dhcp' if item.props.ip == 'dhcp'
            else 'ip=' ~ item.props.ip
                 ~ (',gw=' ~ item.props.gw if item.props.gw is defined else '')
          )
        })
      }}
  loop: "{{ resolved_networks }}"
  loop_control:
    label: "ipconfig{{ item.index }} ({{ item.key }})"

- name: Show computed QEMU network config
  ansible.builtin.debug:
    msg:
      net: "{{ qemu_net }}"
      ipconfig: "{{ qemu_ipconfig }}"

- name: Check if VM Exists
  community.proxmox.proxmox_vm_info:
    node: pve
    api_user: robot@pam
    api_host: 192.168.1.100
    api_token_id: "{{ api_catalog.pve_api.id }}"
    api_token_secret: "{{ api_catalog.pve_api.key }}"
    name: '{{ inventory_hostname }}'
    type: qemu
  register: does_vm

# NOTE: full QEMU VM build-out (disk import, cloud-init drive, etc.) is not
# yet implemented — this file historically only checked existence. The
# network facts above (qemu_net / qemu_ipconfig) are ready to feed a
# community.proxmox.proxmox_kvm build task when that's added, e.g.:
#
#   - name: Build New Proxmox VM
#     community.proxmox.proxmox_kvm:
#       ...
#       net: "{{ qemu_net }}"
#       ipconfig: "{{ qemu_ipconfig }}"
#       ...
#     when: does_vm.proxmox_vms[0] is not defined
