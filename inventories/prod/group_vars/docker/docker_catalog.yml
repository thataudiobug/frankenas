docker_containers_catalog:  # pick many
  npm:
    image: "jc21/nginx-proxy-manager:latest"
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - '{{ droplet_bind_catalog.config.mnt }}/npm/data:/data'
      - '{{ droplet_bind_catalog.config.mnt }}/npm/letsencrypt:/etc/letsencrypt'

  termix:
    image: "ghcr.io/lukegus/termix:latest"
    ports:
      - "8443:8443"
    volumes:
      - '{{ droplet_bind_catalog.config.mnt }}/termix:/app/data'
    env:
      PUID: "1000"
      PGID: "1000"
      ENABLE_SSL: "true"
      SSL_KEY_PATH: "/app/data/ssl/termix.key"
      SSL_CERT_PATH: "/app/data/ssl/termix.crt"
      SSL_PORT: "8443"

  nextcloud:
    image: "lscr.io/linuxserver/nextcloud:latest"
    ports:
      - "8097:8097"
    volumes:
      - '{{ droplet_bind_catalog.config.mnt }}/nextcloud:/config'
    env:
      PUID: "1000"
      PGID: "1000"
      TZ: "america/detroit"

  jellyfin:
    image: "jellyfin/jellyfin:latest"
    ports:
      - "8096:8096"
    volumes:
      - '{{ droplet_bind_catalog.config.mnt }}/jellyfin/config:/config'
      - '{{ droplet_bind_catalog.nott.mnt }}:/cache'
      - '{{ droplet_bind_catalog.media.mnt }}:/media'
    devices:
      - "/dev/dri:/dev/dri"

  ombi:
    image: "linuxserver/ombi:latest"
    ports:
      - "3579:3579"
    volumes:
      - '{{ droplet_bind_catalog.config.mnt }}/ombi:/config'
    env:
      PUID: "1000"
      PGID: "1000"
      TZ: "america/detroit"

  prowlarr:
    image: "linuxserver/prowlarr:latest"
    ports:
      - "9696:9696"
    volumes:
      - '{{ droplet_bind_catalog.config.mnt }}/prowlarr:/config'
    env:
      PUID: "1000"
      PGID: "1000"
      TZ: "america/detroit"

  sonarr:
    image: "linuxserver/sonarr:latest"
    ports:
      - "8989:8989"
    volumes:
      - '{{ droplet_bind_catalog.config.mnt }}/sonarr:/config'
      - '{{ droplet_bind_catalog.media.mnt }}/tv:/tv'
      - '{{ droplet_bind_catalog.media.mnt }}/downloads:/downloads'
    env:
      PUID: "1000"
      PGID: "1000"
      TZ: "america/detroit"

  radarr:
    image: "linuxserver/radarr:latest"
    ports:
      - "7878:7878"
    volumes:
      - '{{ droplet_bind_catalog.config.mnt  }}/radarr:/config'
      - '{{ droplet_bind_catalog.media.mnt }}/movies:/movies'
      - '{{ droplet_bind_catalog.media.mnt }}/downloads:/downloads'
    env:
      PUID: "1000"
      PGID: "1000"
      TZ: "america/detroit"

  lidarr:
    image: "linuxserver/lidarr:latest"
    ports:
      - "8686:8686"
    volumes:
      - '{{ droplet_bind_catalog.config.mnt  }}/lidarr:/config'
      - '{{ droplet_bind_catalog.media.mnt }}/music:/music'
      - '{{ droplet_bind_catalog.media.mnt }}/downloads:/downloads'
    env:
      PUID: "1000"
      PGID: "1000"
      TZ: "america/detroit"

  qbittorrent:
    image: "linuxserver/qbittorrent:latest"
    ports:
      - "6881:6881"
      - "6881:6881/udp"
      - "8080:8080"
    volumes:
      - '{{ droplet_bind_catalog.config.mnt  }}/qbittorrent:/config'
      - '{{ droplet_bind_catalog.media.mnt  }}/downloads:/downloads'
    env:
      PUID: "1000"
      PGID: "1000"
      TZ: "america/detroit"
      WEBGUI_PORT: "8080"
      TORRENTING_PORT: "6881"


docker_groups_catalog:  # pick many
  piracy:
    radarr:
    lidarr:
    sonarr:
    prowlarr:
    qbittorrent:

  proxys:
    npm:

  public:
    jellyfin:
    npm:
    ombi:
    termix:
    nextcloud:

  testing:
    radarr:
    sonarr:
    termix:
