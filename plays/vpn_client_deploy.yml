# Deploy VPN client + kill switch to vpn_clients hosts
---
# Provisions the OpenVPN client and fail-closed firewall on hosts in the
# `vpn_clients` group. Run with the vault available so credentials resolve:
#
#   ansible-playbook plays/vpn_client_deploy.yml --limit <host>
#
# (frankinception's play runner supplies the vault password via PTY.)

#Fully provisions hosts who are docker hosts.
- name: Provision Guests
  hosts: vpn_clients
  gather_facts: false
  connection: local
  roles:
    - pve_dl
  when: 'dropplets' in group_names

- name: Deploy VPN client with kill switch
  hosts: vpn_clients
  gather_facts: flase
  become: true
  roles:
    - dl_vpn_client
