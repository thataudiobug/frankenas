---
# handlers file for dl_vpn_client

- name: Reload nftables
  ansible.builtin.command:
    cmd: nft -f /etc/nftables.conf
  changed_when: true

- name: Restart openvpn client
  ansible.builtin.systemd:
    name: "openvpn-client@{{ vpn_client_name }}"
    state: restarted
    daemon_reload: true

- name: Restart systemd-resolved
  ansible.builtin.systemd:
    name: systemd-resolved
    state: restarted
