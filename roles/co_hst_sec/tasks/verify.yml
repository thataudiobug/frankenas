---
# Verification / health checks for the security baseline. Included after
# setup (when co_verify is true) and runnable stand-alone against a host.
#
# Read-only: these tasks inspect state and assert, they never change config.

# --- SSH ------------------------------------------------------------------
- name: Verify the effective sshd config parses cleanly
  ansible.builtin.command:
    cmd: sshd -t
  changed_when: false
  when: co_ssh_harden_enabled | bool

- name: Read back the effective sshd auth settings
  ansible.builtin.command:
    cmd: sshd -T
  register: co_sshd_effective
  changed_when: false
  when: co_ssh_harden_enabled | bool

- name: Assert password auth is disabled in the effective config
  ansible.builtin.assert:
    that:
      - "'passwordauthentication no' in co_sshd_effective.stdout | lower"
    fail_msg: >-
      sshd still reports password authentication enabled. Check for a later
      drop-in overriding {{ co_ssh_dropin_filename }}.
    quiet: true
  when:
    - co_ssh_harden_enabled | bool
    - co_ssh_password_authentication == "no"

# --- Firewall -------------------------------------------------------------
- name: Read back the baseline nftables table
  ansible.builtin.command:
    cmd: nft list table inet filter
  register: co_fw_table
  changed_when: false
  failed_when: false
  when: co_fw_enabled | bool

- name: Assert the input chain default policy is drop
  ansible.builtin.assert:
    that:
      - co_fw_table.rc == 0
      - "'hook input' in co_fw_table.stdout"
      - "'policy drop' in co_fw_table.stdout"
    fail_msg: >-
      The inet filter table is missing or its input policy is not drop.
      nft rc={{ co_fw_table.rc }}.
    quiet: true
  when: co_fw_enabled | bool

# --- Unattended upgrades --------------------------------------------------
- name: Check the apt-daily-upgrade timer is active
  ansible.builtin.command:
    cmd: systemctl is-active apt-daily-upgrade.timer
  register: co_uu_timer
  changed_when: false
  failed_when: false
  when: co_uu_enabled | bool

- name: Assert unattended-upgrades timer is active
  ansible.builtin.assert:
    that:
      - co_uu_timer.stdout | trim == "active"
    fail_msg: "apt-daily-upgrade.timer is not active (got '{{ co_uu_timer.stdout | trim }}')."
    quiet: true
  when: co_uu_enabled | bool

- name: Summarise verification results
  ansible.builtin.debug:
    msg:
      - "ssh hardened: {{ co_ssh_harden_enabled | bool }}"
      - "firewall input drop: {{ (co_fw_enabled | bool) and (co_fw_table.rc | default(1)) == 0 }}"
      - "unattended-upgrades timer active: {{ (co_uu_enabled | bool) and (co_uu_timer.stdout | default('') | trim == 'active') }}"
