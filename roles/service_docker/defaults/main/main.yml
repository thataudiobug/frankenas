---
# defaults file for docker
ansible_user: root

docker_containers: {}
#docker_containers_enabled: []
docker_containers_overrides: {}

docker_networks: {}
docker_volumes: {}

docker_pull_images: true

restart_policy: "unless-stopped"
state: started
env:
  - TZ: america/detroit


config_path: /mnt/config
media_path:  /mnt/media
transcodes_path: /mnt/nott/transcodes
slow_storage: /mnt/nott
big_storage: /mnt/essek
backup_storage: /mnt/yasha
fast_storage: /mnt/caleb

# -- Alloy log-agent integration --------------------------------------
# Where the Alloy agent (installed by config_logging) loads its config dir from,
# and the service user to grant docker-socket access. Kept in sync with
# config_logging's config_logging_alloy_config_dir / service user. The wire_log_agent
# task is a no-op if this directory doesn't exist (Alloy not installed).
docker_alloy_config_dir: "/etc/alloy/config.d"
docker_alloy_user: "alloy"

# -- Compose stacks ----------------------------------------------------
# Root dir under which each compose stack gets its own project directory
# (rendered compose.yml + .env). compose_enabled (host_var) selects stacks
# from compose_catalog.
docker_compose_root: "/opt/compose"
# Image pull policy for `docker compose up` (missing|always|never|build).
compose_pull_policy: "missing"
