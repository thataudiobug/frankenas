---
# Verification for service_lldap. Confirms the data dir exists and (if the
# container is running) the LDAP port + web UI answer. Read-only.

- name: Confirm the LLDAP data dir exists
  ansible.builtin.stat:
    path: "{{ service_lldap_data_root }}"
  register: _ls_data

- name: Assert the data dir is present
  ansible.builtin.assert:
    that:
      - _ls_data.stat.exists
      - _ls_data.stat.isdir
    fail_msg: "LLDAP data dir {{ service_lldap_data_root }} is missing."
    quiet: true

# The web UI returning 200 means LLDAP started and parsed its env config.
- name: Probe the LLDAP web UI (if the container is running)
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ service_lldap_web_port }}/"
    status_code: [200]
    timeout: 10
  register: _ls_web
  failed_when: false
  changed_when: false

# Confirm the LDAP port is actually accepting connections (this is what
# Authelia will bind to). A closed port here means SSO will fail closed.
- name: Check the LDAP port is open
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: "{{ service_lldap_ldap_port }}"
    timeout: 10
    state: started
  register: _ls_ldap
  failed_when: false

- name: Warn if LLDAP is not answering yet
  ansible.builtin.debug:
    msg: >-
      LLDAP is not fully up yet (web {{ _ls_web.status | default('n/a') }},
      ldap port {{ service_lldap_ldap_port }}
      {{ 'open' if _ls_ldap.elapsed is defined and not _ls_ldap.failed else 'closed' }}).
      If just deployed it may still be starting; otherwise check
      `docker logs lldap`.
  when: _ls_web.status | default(0) != 200

- name: Summarise LLDAP verification
  ansible.builtin.debug:
    msg:
      - "data dir: {{ _ls_data.stat.exists }}"
      - "base dn: {{ service_lldap_base_dn }}"
      - "web ui: {{ _ls_web.status | default('not running yet') }}"
      - "ldap port open: {{ not (_ls_ldap.failed | default(true)) }}"
      - "REMINDER: after first boot, create the '{{ service_lldap_bind_user }}' account in the LLDAP UI and grant it lldap_password_manager so Authelia can change passwords."
