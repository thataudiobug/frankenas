---
# handlers file for co_hst_sec

# Reload (not restart) so the live connection Ansible is riding on survives
# even if the new config would have refused it. sshd re-reads config for new
# connections only; existing sessions are untouched.
- name: Reload sshd
  ansible.builtin.systemd:
    name: "{{ co_ssh_service_name }}"
    state: reloaded

# Atomic swap of the whole ruleset. Validation already happened via the
# template's `nft -c -f` guard before the file was written.
- name: Reload nftables
  ansible.builtin.command:
    cmd: "nft -f {{ co_fw_conf_path }}"
  changed_when: true

- name: Restart chrony
  ansible.builtin.systemd:
    name: "{{ co_chrony_service_name }}"
    state: restarted
