---
# defaults file for service_reverse_proxy
#
# service_reverse_proxy configures the reverse-proxy host (NPM). Right now its job is the
# Authelia forward-auth integration: it drops two nginx snippet files into a
# path NPM can `include`, so each protected proxy host can gate itself behind
# Authelia by adding two lines in its NPM "Advanced" config.
#
# Why snippets + manual include (rather than editing NPM's generated configs):
# NPM owns /data/nginx/proxy_host/*.conf and rewrites them, so editing those
# directly is not idempotent. The supported pattern is reusable snippets the
# operator references from each proxy host's Advanced tab — reversible per
# host (delete the two lines), which preserves the break-glass property.

# Where NPM's /data is bind-mounted on the proxy host (matches the npm
# container volume: {{ config.mnt }}/npm/data -> /data). Snippets go under a
# custom/ dir there so they're visible inside the container at /data/...
service_reverse_proxy_npm_data_path: "/mnt/config/npm/data"
service_reverse_proxy_snippets_subdir: "nginx/custom"

# Authelia portal + internal forward-auth endpoint. The internal URL is the
# OOB address Authelia listens on (NPM reaches it over OOB); the portal URL
# is the public redirect target for unauthenticated users.
service_reverse_proxy_authelia_internal_url: "http://10.128.0.4:9091"
service_reverse_proxy_authelia_portal_url: "https://auth.frankenas.com"

# Render the Authelia snippets at all. Toggle off if you remove Authelia.
service_reverse_proxy_authelia_enabled: true

service_reverse_proxy_verify: true
