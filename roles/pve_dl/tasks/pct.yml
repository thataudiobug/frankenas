---
# tasks file for pve_dl_ct
- name: Build the LXC netif mapping from resolved networks
  ansible.builtin.set_fact:
    pct_netif: >-
      {{
        pct_netif | default({}) | combine({
          'net' ~ item.index: (item.props.items() | map('join', '=') | join(','))
        })
      }}
  loop: "{{ resolved_networks }}"
  loop_control:
    label: "net{{ item.index }} ({{ item.key }})"

- name: Show computed LXC netif mapping
  ansible.builtin.debug:
    var: pct_netif

# Resolve the DNS profile (catalog -> enabled) once. Falls back to an empty
# mapping when a host doesn't set dns_enabled, so nameserver/searchdomain
# are simply omitted from the build rather than erroring.
- name: Resolve the DNS resolver profile for this host
  ansible.builtin.set_fact:
    _dns_cfg: "{{ dns_catalog[dns_enabled] | default({}, true) if dns_enabled is defined else {} }}"

#- name: Check if Proxmox Container Exists
#  community.proxmox.proxmox_vm_info:
#    node: pve
