---
# defaults file for dl_log_srv
#
# dl_log_srv prepares the central log-aggregation server (Mollymauk): it
# renders the Loki and Grafana configuration onto the host's bind-mounted
# storage so the Docker stack (loki + grafana, deployed via the `docker`
# role's catalog) can mount them. Loki chunk/index data lives on the Nott
# 2TB mirror; the OS disk stays read-mostly.
#
# This role owns CONFIG + STORAGE LAYOUT only. The containers themselves are
# defined in docker_containers_catalog (loki, grafana) and deployed by the
# `docker` role — same split as every other service droplet.

# -- Storage layout (on the Nott bind) ---------------------------------
# The Nott dataset is bind-mounted into the guest at /mnt/nott (see
# droplet_bind_catalog.nott). Everything heavy goes under here.
log_srv_data_root: "/mnt/nott/loki"
log_srv_config_root: "/mnt/config/loki"          # small config, on config bind
log_srv_grafana_config_root: "/mnt/config/grafana"

# Subdirs Loki needs (chunks, rules, compactor working dir, WAL).
log_srv_loki_dirs:
  - "{{ log_srv_data_root }}/chunks"
  - "{{ log_srv_data_root }}/rules"
  - "{{ log_srv_data_root }}/compactor"
  - "{{ log_srv_data_root }}/wal"

# -- Retention ---------------------------------------------------------
# 180 days, per the plan. The Nott mirror is dedicated to logs for now, so
# this is generous on purpose; tune down later if it grows faster than
# expected. retention_period must be a multiple of 24h for Loki.
log_srv_retention_period: "4320h"   # 180 days
log_srv_retention_enabled: true

# -- Loki listen / bind ------------------------------------------------
# Loki has NO authentication by default, so it must only ever listen on the
# OOB management interface. The container publishes this port; the pve_fw
# profile restricts :3100 to the OOB CIDR as defence in depth.
log_srv_loki_http_port: 3100
log_srv_loki_grpc_port: 9095

# -- Grafana -----------------------------------------------------------
log_srv_grafana_port: 3000
# Grafana admin password — pull from vault in real use. Placeholder default
# forces an override; the preflight asserts it was changed.
log_srv_grafana_admin_user: "admin"
log_srv_grafana_admin_password: "CHANGE_ME_IN_VAULT"

# OOB host the agents ship to / Grafana queries Loki at. The Grafana
# datasource points at the loki container over the docker network by name.
log_srv_loki_datasource_url: "http://loki:3100"

log_srv_verify: true
