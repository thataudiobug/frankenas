droplets:
  children:
    pct:
      hosts:
        c2-ansible:
          ansible_host: localhost
        dns-oob:          # the dnsmasq DHCP+DNS CT (OOB static anchor 10.128.0.2)
        port-royal:
        test-port-01:
        test-port-02:
    qemu:
      hosts:
        port-tortuga:

docker:
  hosts:
    port-tortuga:
    test-port-01:
    test-port-02:

testing:
  hosts:
    test-port-01:
    dns-oob:
    test-port-02:

vpn_clients:
  hosts:
    test-port-02:

# group the dns_srv_deploy play applies dl_dns_srv to
dns_srv:
  hosts:
    dns-oob:

hosts_baremetal:
  hosts:
    pve:
      # OOB management anchor (10.128.0.1). The Proxmox API is reached at the
      # literal WAN address 192.168.1.100 (hardcoded as api_host in pve_dl),
      # so this value only affects SSH/pvesh management. See host_vars/pve.yml
      # for the static-anchor NIC pinning.
      ansible_host: 10.128.0.1

switches:
  hosts:
    agg_01:
      ansible_host: 192.168.1.51
    cor_01:
      ansible_host: 192.168.1.50

waps:
  hosts:
    bg_01:
      ansible_host: 192.168.1.254

firewalls:
  hosts:
    bg_01:

dns:
  hosts:
    bg_01:

security:
  hosts:
    cam_cmh_living_room_01:
      ansible_host: 192.168.1.60

iot:
  hosts:
    tv_cmh_living_room_01:
      ansible_host: 192.168.1.70

network:
  children:
    switches:
    waps:
    firewalls:
    dns:

hosts_all:
  children:
    droplets:
    docker:
    hosts_baremetal:

datacenter:
  children:
    network:
    hosts_all:
    security:
    iot:
