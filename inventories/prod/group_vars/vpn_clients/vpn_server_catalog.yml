---
# VPN server catalog for the dl_vpn_client role.
#
# Each entry is a selectable OpenVPN server. A host picks one by setting
#   ovpn_server_enabled: <key>
# in its host_vars. The endpoint host/port/proto are parsed from the
# .ovpn file itself — only the file and credentials live here.
#
# Store the actual values in the vault (vault_*). The references below
# resolve at play time; the plaintext never sits in this file.
#
# This is discoverable by frankinception's catalog -> enabled framework
# (key ends in `_catalog`), so you can manage server selection from the
# TUI once a host is in the vpn_client group.

ovpn_server_catalog:  # pick one
   ca_toronto:
     ovpn_file: "{{ vault_ca_toronto_ovpn }}"
     ovpn_user: "{{ vault_ca_toronto_user }}"
     ovpn_pass: "{{ vault_ca_toronto_pass }}"
