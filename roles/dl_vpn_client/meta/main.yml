galaxy_info:
  author: frankenas
  description: >-
    Configure an Ubuntu host as an OpenVPN client with a fail-closed
    (kill-switch) nftables firewall, so WAN traffic can only egress via
    the tunnel and cannot leak onto the physical link.
  license: MIT
  min_ansible_version: "2.12"
  galaxy_tags:
    - vpn
    - openvpn
    - nftables
    - firewall
    - security

