---
# Preflight: validate the inputs that, if wrong, would lock us out or
# silently no-op. Cheap to run, and far better than discovering a bad CIDR
# after the drop policy is live.

- name: Assert the management CIDR is set and parses as a network
  ansible.builtin.assert:
    that:
      - co_mgmt_cidr | length > 0
      - co_mgmt_cidr | ansible.utils.ipaddr('net') is truthy
    fail_msg: >-
      co_mgmt_cidr ('{{ co_mgmt_cidr | default("") }}') must be a valid CIDR
      (e.g. 10.128.0.0/9). It is allowlisted for SSH before the firewall's
      drop policy — an empty or wrong value locks out C2/Ansible.
    quiet: true

- name: Assert any extra admin CIDRs parse as networks
  ansible.builtin.assert:
    that:
      - item | ansible.utils.ipaddr('net') is truthy
    fail_msg: "co_admin_extra_cidrs entry '{{ item }}' is not a valid CIDR."
    quiet: true
  loop: "{{ co_admin_extra_cidrs }}"

- name: Assert firewall port rules are well-formed
  ansible.builtin.assert:
    that:
      - item.proto in ['tcp', 'udp']
      - item.port is defined
    fail_msg: >-
      Each firewall port rule needs proto (tcp|udp) and port. Offending
      entry: {{ item }}
    quiet: true
  loop: "{{ co_fw_allow_ports_public + co_fw_allow_ports_restricted }}"
  when: co_fw_enabled | bool

- name: Assert restricted port rules carry a valid source CIDR
  ansible.builtin.assert:
    that:
      - item.cidr is defined
      - item.cidr | ansible.utils.ipaddr('net') is truthy
    fail_msg: >-
      co_fw_allow_ports_restricted entries need a valid 'cidr'. Offending
      entry: {{ item }}
    quiet: true
  loop: "{{ co_fw_allow_ports_restricted }}"
  when: co_fw_enabled | bool

# Defensive: this role is supposed to be skipped on kill-switch hosts (the
# co_fw_enabled default excludes the vpn_clients group). If someone force-
# enables it there anyway, warn loudly — two writers to /etc/nftables.conf
# will fight.
- name: Warn if the firewall is forced on alongside the VPN kill switch
  ansible.builtin.debug:
    msg: >-
      WARNING: co_fw_enabled is true on a host in the vpn_clients group.
      dl_vpn_client owns {{ co_fw_conf_path }} with a `flush ruleset` kill
      switch; running both will clobber one ruleset. Leave co_fw_enabled at
      its default (false on vpn_clients) unless you know what you're doing.
  when:
    - co_fw_enabled | bool
    - "'vpn_clients' in group_names"
