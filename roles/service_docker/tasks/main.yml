- name: Gather some facts
  service_facts:

#- name: Check Dependancies
#  apt:
#    name: ["python3", "python3-requests"]

- name: Build Docker CE
  include_tasks: install_docker.yml
  when: ansible_facts.services['docker.service'].state is undefined

- name: Deploy Containers
  import_tasks: deploy_containers.yml

- name: Deploy Compose Stacks
  import_tasks: deploy_compose.yml

# Wire Docker container logs into the Alloy agent (if present). Owned here,
# not in config_logging, so docker concerns don't leak onto non-docker hosts.
- name: Wire Docker logs into the Alloy log agent
  import_tasks: wire_log_agent.yml
