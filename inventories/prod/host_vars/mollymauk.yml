# mollymauk — central log-aggregation server (Loki + Grafana).
#
# Infrastructure box: every other host ships logs here. The Alloy agents ship
# to the FQDN mollymauk.oob.frankenas.lan (config_logging_loki_host), so that
# name MUST resolve — but mollymauk uses a STATIC OOB anchor below the DHCP
# pool, so dnsmasq never auto-registers it from a lease. The config_pinned_dns
# role publishes its host-record on the DNS server at build time (see
# pinned_dns_ip below). Next free anchor after pve(.1) / dns(.2) / c2(.3) /
# identity-reserved(.4) is .5.
#
# OS on the small (s8) template — nothing writes to the OS disk after build;
# all log data lands on the Nott 2TB mirror bind. Loki is unauthenticated,
# so it is published on the OOB interface only and firewalled to OOB.
ansible_host: mollymauk.oob.frankenas.lan

os_enabled: "ubuntu"
compute_enabled: "medium"        # Loki + Grafana; a touch more headroom
storage_enabled: "s8"            # OS only; data is on the Nott bind
dns_enabled: oob
users_enabled: [casey, robot]

network_enabled:
  wan:        # apt + Grafana plugin downloads
  oob:

# DNS: config_pinned_dns publishes this OOB ip as a host-record on the DNS
# server at build time (mollymauk doesn't DHCP, so it isn't auto-registered).
# The record IP is derived from network_enabled.oob.ip above (CIDR stripped)
# — single source of truth, no separate value to keep in sync.

# Storage: OS on s8, all Loki chunks/index on the Nott 2TB mirror bind,
# small config on the config bind.
droplet_bind_enabled:
  nott:
  config:

# Deploy the Loki + Grafana stack here.
docker_groups_enabled:
  observability:

# Hypervisor-enforced firewall: only the log/metrics ports, OOB-only.
firewall_enabled: logserver

# Don't ship the log server's own agent to itself before Loki is up. Its
# container logs are still captured (docker -> journald) and can be added
# later once the stack is healthy.
config_logging_enabled: false

# Grafana admin password — OVERRIDE FROM VAULT. Placeholder here will make
# service_loki refuse to run until set.
grafana_admin_password: "{{ vault_grafana_admin_password }}"
