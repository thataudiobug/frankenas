droplets:
  children:
    pct:
      hosts:
        c2-ansible:
          ansible_host: localhost
        dns-oob:          # the dnsmasq DHCP+DNS CT (OOB static anchor 10.128.0.2)
        port-royal:
        port-tortuga:
        test-port-01:
        mollymauk:        # central log server (Loki+Grafana, OOB anchor 10.128.0.5)
        orthax:           # central auth/SSO server (Authelia+Redis, OOB anchor 10.128.0.4)

    qemu:
      hosts:
        test-port-02:

docker:
  hosts:
    port-tortuga:
    test-port-01:
    mollymauk:
    orthax:

testing:
  hosts:
    test-port-01:
    test-port-02:

vpn_clients:
  hosts:
    port-tortuga:

piracy:
  hosts:
    port-tortuga:

# reverse-proxy (NPM) hosts — service_reverse_proxy drops the Authelia forward-auth snippets here
reverse_proxy:
  hosts:
    port-royal:

# group the config_dns_srv play applies service_dns to
dns_srv:
  hosts:
    dns-oob:

# group the config_log_srv play applies service_loki to (Loki+Grafana server)
log_srv:
  hosts:
    mollymauk:

# group the config_auth_srv play applies service_authelia to (Authelia+Redis server)
auth_srv:
  hosts:
    orthax:

# Critical / recovery-path infrastructure: hosts with a STATIC OOB anchor IP
# (below the DHCP pool, so dnsmasq never auto-registers them from a lease).
# The config_pinned_dns role registers each member's host-record on the DNS
# server at build time, using the `pinned_dns_ip` host_var. The DNS server
# itself (dns-oob) is included for completeness but config_pinned_dns skips
# self-registration — its own anchor lives in the bootstrap dns_srv_catalog.
critical:
  hosts:
    pve:
    dns-oob:
    c2-ansible:
    orthax:
    mollymauk:

hosts_baremetal:
  hosts:
    pve:
      # OOB management anchor (10.128.0.1). The Proxmox API is reached at the
      # literal WAN address 192.168.1.100 (hardcoded as api_host in provision_proxmox),
      # so this value only affects SSH/pvesh management. See host_vars/pve.yml
      # for the static-anchor NIC pinning.
      ansible_host: 10.128.0.1

switches:
  hosts:
    agg_01:
      ansible_host: 192.168.1.51
    cor_01:
      ansible_host: 192.168.1.50

waps:
  hosts:
    bg_01:
      ansible_host: 192.168.1.254

firewalls:
  hosts:
    bg_01:

security:
  hosts:
    cam_cmh_living_room_01:
      ansible_host: 192.168.1.60

iot:
  hosts:
    tv_cmh_living_room_01:
      ansible_host: 192.168.1.70

network:
  children:
    switches:
    waps:
    firewalls:
    dns:

hosts_all:
  children:
    droplets:
    docker:
    hosts_baremetal:

datacenter:
  children:
    network:
    hosts_all:
    security:
    iot:
