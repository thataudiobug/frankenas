---
# Pinned to known-good versions (verified against this codebase). Each uses a
# floor at the tested version and a ceiling at the next major, so patch/minor
# updates flow in but a breaking major bump can't land silently. Bump the
# ceilings deliberately after testing a new major.
collections:
  - name: community.docker
    version: ">=5.2.1,<6.0.0"
  - name: community.general
    version: ">=13.0.1,<14.0.0"
  - name: ansible.posix
    version: ">=2.2.0,<3.0.0"
  - name: ansible.utils
    version: ">=6.0.2,<7.0.0"
  # Used by provision_proxmox (proxmox, proxmox_vm_info) and config_firewall
  # (proxmox_vm_info). Was previously relied on implicitly; pinned here so the
  # hypervisor-enforced firewall modules resolve.
  - name: community.proxmox
    version: ">=2.0.0,<3.0.0"
