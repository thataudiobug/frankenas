---
# defaults file for service_authelia
#
# service_authelia prepares the central authentication / SSO server (Orthax):
# Authelia + Redis. It renders Authelia's configuration.yml, the YAML user
# database, and the secret material onto the host's bind storage so the
# Docker stack (authelia + redis, deployed via the `docker` role) can mount
# them.
#
# Authelia is the AUTH/SSO + AUTHORIZATION layer, NOT a directory. The user
# store is a flat YAML file (argon2id-hashed passwords) — simple to start,
# and swappable for LDAP later without changing the web-auth design.
#
# Division of labour (same as service_loki):
#   * provision_proxmox      builds the LXC + applies the config bind + OOB anchor .4
#   * service_authelia (this role) lays out storage + renders config/users/secrets
#   * service_docker role deploys the authelia + redis containers (group `identity`)
#   * NPM forward-auth wiring (separate) gates each protected proxy host

# -- Storage layout (on the config bind) -------------------------------
# Authelia is light; SQLite (TOTP secrets, identity) + config live on the
# config bind. Redis holds sessions (ephemeral-ish), also on the bind so
# they survive a container recreate.
service_authelia_config_root: "/mnt/config/authelia"
service_authelia_redis_root: "/mnt/config/redis"
service_authelia_dirs:
  - "{{ service_authelia_config_root }}"
  - "{{ service_authelia_redis_root }}"

# -- Identity / domain -------------------------------------------------
# The root protected domain. The session cookie is scoped here so SSO works
# across every *.frankenas.com app behind NPM. The portal lives at the
# auth_* subdomain.
service_authelia_root_domain: "frankenas.com"
service_authelia_portal_url: "https://auth.{{ service_authelia_root_domain }}"
service_authelia_totp_issuer: "{{ service_authelia_root_domain }}"

# -- Listen / ports ----------------------------------------------------
# Authelia listens on 9091 (the forward-auth endpoint NPM calls, and the
# login portal). Published on the OOB anchor; NPM reaches it over OOB and
# the public path comes through NPM, not directly.
service_authelia_port: 9091
service_authelia_redis_port: 6379
# OOB self-IP for binding the published container ports (static anchor).
service_authelia_oob_ip: "10.128.0.4"

# -- Session / regulation ----------------------------------------------
service_authelia_session_expiration: "1h"
service_authelia_session_inactivity: "5m"
# Brute-force regulation: lock an account after N failures within find_time.
service_authelia_regulation_max_retries: 3
service_authelia_regulation_find_time: "2m"
service_authelia_regulation_ban_time: "10m"

# -- Secrets (FROM VAULT) ----------------------------------------------
# These MUST be overridden from the vault. The role asserts they are not the
# placeholders below before rendering, so a real secret is always required.
#   * session secret       — signs/encrypts the session cookie
#   * storage encryption    — encrypts TOTP secrets at rest in SQLite
#   * reset-password JWT     — signs password-reset links
#   * redis password        — auth between Authelia and Redis
service_authelia_session_secret: "CHANGE_ME_VAULT"
service_authelia_storage_encryption_key: "CHANGE_ME_VAULT"
service_authelia_jwt_secret: "CHANGE_ME_VAULT"
service_authelia_redis_password: "CHANGE_ME_VAULT"

# -- Users -------------------------------------------------------------
# Users now live in LLDAP (the directory), NOT in a file here. Create and
# manage them in the LLDAP web UI; Authelia authenticates against LLDAP via
# the LDAP backend below. This removes the config-drift problem and gives
# users permanent, self-service password changes.

# -- LDAP backend (LLDAP) ----------------------------------------------
# Authelia binds to LLDAP using its built-in 'lldap' implementation template
# (handles all attribute/filter mappings). LLDAP runs in the same identity
# stack, reachable over the docker network by name.
service_authelia_ldap_implementation: "lldap"
service_authelia_ldap_address: "ldap://lldap:3890"
service_authelia_ldap_base_dn: "dc=frankenas,dc=com"
# Bind account (created in LLDAP, granted lldap_password_manager so Authelia
# can change passwords). DN follows LLDAP's people OU layout.
service_authelia_ldap_bind_user: "authelia_bind"
service_authelia_ldap_bind_dn: "uid={{ service_authelia_ldap_bind_user }},ou=people,{{ service_authelia_ldap_base_dn }}"
# Bind password — FROM VAULT (same value as the LLDAP bind account). Shared
# with service_lldap's service_lldap_bind_password.
service_authelia_ldap_bind_password: "CHANGE_ME_VAULT"
# How often Authelia re-checks LDAP for user/group updates.
service_authelia_ldap_refresh_interval: "1m"
# Allow Authelia's self-service password reset/change (requires the bind
# account to hold lldap_password_manager in LLDAP).
service_authelia_password_reset_disable: false
service_authelia_password_change_disable: false

# -- Access control (catalog -> rules) ---------------------------------
# Per-domain authorization + factor level. Evaluated top-to-bottom, FIRST
# MATCH WINS, against service_authelia_default_policy: deny (an app with no
# rule is unreachable). Each rule: domain (required), optional subject
# (user:<name>/group:<name>), policy (bypass|one_factor|two_factor|deny),
# optional resources/networks. Moved here from group_vars/all in Phase 3.
service_authelia_default_policy: "deny"
authelia_access_catalog:  # reference
  # Auth portal itself must always be reachable to log in.
  - { domain: 'auth.frankenas.com', policy: 'bypass' }

  # Media: password only, media group. No TOTP ever prompted.
  - { domain: 'jellyfin.frankenas.com', subject: 'group:media', policy: 'one_factor' }
  - { domain: 'ombi.frankenas.com', subject: 'group:media', policy: 'one_factor' }

  # *arr / download admin apps: admins only, TOTP forced.
  - { domain: 'radarr.frankenas.com', subject: 'group:admins', policy: 'two_factor' }
  - { domain: 'sonarr.frankenas.com', subject: 'group:admins', policy: 'two_factor' }
  - { domain: 'lidarr.frankenas.com', subject: 'group:admins', policy: 'two_factor' }
  - { domain: 'prowlarr.frankenas.com', subject: 'group:admins', policy: 'two_factor' }
  - { domain: 'qbittorrent.frankenas.com', subject: 'group:admins', policy: 'two_factor' }

  # Nextcloud: any authenticated user, password only (it has its own 2FA).
  - { domain: 'nextcloud.frankenas.com', subject: 'group:media', policy: 'one_factor' }

# -- Trusted proxies (real client IP behind NPM / Cloudflare) ----------
# Authelia derives the real client IP from X-Forwarded-For sent by NPM. List
# the proxy/management nets it should trust. No Cloudflare-side config is
# needed — NPM already forwards the client IP.
service_authelia_trusted_proxies:
  - "10.128.0.0/9"   # OOB (NPM reaches Authelia over OOB)
  - "10.0.0.0/9"     # WAN service segment (NPM's WAN side)

service_authelia_verify: true
