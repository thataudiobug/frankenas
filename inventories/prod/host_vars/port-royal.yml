ansible_host: port-royal.oob.frankenas.lan   # was 192.168.1.103

docker_groups_enabled:
  public:

gpu_enabled: true
compute_enabled: "small"
accelerator_enabled: "false"
storage_enabled: "m8"
dns_enabled: oob            # resolve through the OOB dnsmasq server
network_enabled:
  wan:        # default route + internet
  oob:        # connection NIC, DHCP lease, auto-registered A record
os_enabled: "ubuntu"
users_enabled: [casey, robot]

# Log shipping: docker container logs + NPM proxy logs (this host runs the
# `public` group, which includes npm). journald ships automatically.
log_sources_enabled: [docker, npm]

docker_containers_overrides:
