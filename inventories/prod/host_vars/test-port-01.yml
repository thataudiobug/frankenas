ansible_host: test-port-01.oob.frankenas.lan   # was 192.168.1.110
os_enabled: "ubuntu"

docker_groups_enabled:
  piracy:


docker_containers_overrides:

gpu_enabled: false
compute_enabled: "small"
accelerator_enabled: "false"
storage_enabled: "s8"
network_enabled:
  wan:        # default route + internet
  oob:        # connection NIC, DHCP lease, auto-registered A record


users_enabled: [casey, robot]

# Log shipping: this host is in the `docker` group, so capture container
# logs alongside journald (journald ships automatically).
log_sources_enabled: [docker]
dns_enabled: public
droplet_bind_enabled:
  media:
  config:
