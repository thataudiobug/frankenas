---
# Verification for pve_fw. Read-only: confirms the guest .fw file is present
# and that the live, compiled ruleset reflects it. Runs work on the pve node.

- name: Read back the rendered guest firewall file
  ansible.builtin.slurp:
    src: "/etc/pve/firewall/{{ _fw_vmid }}.fw"
  register: _fw_readback
  delegate_to: "{{ pve_fw_node }}"
  connection: ssh

- name: Assert the firewall file is enabled with the expected in-policy
  ansible.builtin.assert:
    that:
      - "'enable: 1' in (_fw_readback.content | b64decode)"
      - "'policy_in: ' ~ (_fw.policy_in | default('DROP')) in (_fw_readback.content | b64decode)"
    fail_msg: >-
      {{ _fw_vmid }}.fw is missing the enable flag or expected in-policy.
    quiet: true

- name: Confirm the compiled ruleset is valid for this guest
  ansible.builtin.command:
    cmd: "pve-firewall compile"
  register: _fw_compile
  delegate_to: "{{ pve_fw_node }}"
  connection: ssh
  changed_when: false
  failed_when: _fw_compile.rc != 0

- name: Summarise pve_fw verification
  ansible.builtin.debug:
    msg:
      - "guest: {{ inventory_hostname }} (vmid {{ _fw_vmid }})"
      - "profile: {{ firewall_enabled }}"
      - "policy_in: {{ _fw.policy_in | default('DROP') }}"
      - "fw file enabled: {{ 'enable: 1' in (_fw_readback.content | b64decode) }}"
      - "compiled ok: {{ _fw_compile.rc == 0 }}"
