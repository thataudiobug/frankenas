- name: Build New Proxmox Containers
  community.proxmox.proxmox:
    node: pve
    api_user: robot@pam
    api_host: 192.168.1.100
    api_token_id: "{{ api_catalog.pve_api.id }}"
    api_token_secret: "{{ api_catalog.pve_api.key }}"
    hostname: '{{ inventory_hostname }}'
    ostemplate: "{{ os_catalog[os_enabled]['ct_template'] }}"
    cores: "{{ compute_catalog[compute_enabled]['cores'] }}"
    memory: "{{ compute_catalog[compute_enabled]['memory_mb'] }}"
    disk_volume:
      storage: "{{ storage_catalog[storage_enabled]['disk_type'] }}"
      size: "{{ storage_catalog[storage_enabled]['disk_size_gb'] }}"
    pubkey: "{{ users_enabled
        | select('in', users_catalog)
        | map('extract', users_catalog, 'key')
        | list
        | join('\n') }}"
    netif: "{{ pct_netif }}"
    # Resolver set at build time (catalog -> enabled) so the guest has
    # working DNS from first boot, before it runs apt. `dns_enabled` names a
    # dns_catalog entry; the dnsmasq server picks 'public' (it can't resolve
    # through itself before it's up), everything else picks 'oob'.
    nameserver: "{{ _dns_cfg.nameserver | default(omit) }}"
    searchdomain: "{{ _dns_cfg.searchdomain | default(omit) }}"
    features:
      - "nesting=1"
    state: present
  register: was_built
  #when: does_vm.proxmox_vms[0] is not defined

- name: Remove Stale known_hosts Entries for Rebuilt Container
  command: ssh-keygen -R "{{ item }}"
  loop:
    - "{{ inventory_hostname }}"
    - "{{ ansible_host }}"
  delegate_to: localhost
  changed_when: false
  failed_when: false

- name: Stamp the build description (only on a fresh build)
  community.proxmox.proxmox:
    node: pve
    api_user: robot@pam
    api_host: 192.168.1.100
    api_token_id: "{{ api_catalog.pve_api.id }}"
    api_token_secret: "{{ api_catalog.pve_api.key }}"
    hostname: '{{ inventory_hostname }}'
    vmid: "{{ was_built.vmid }}"
    description: "Last rebuilt by script at {{ now() | string }}"
    state: present
  when: was_built.changed

- name: Wait for the container config to register on pve
  ansible.builtin.wait_for:
    path: "/etc/pve/lxc/{{ was_built.vmid }}.conf"
    state: present
    timeout: 60
    sleep: 2
  delegate_to: pve
  when: was_built is changed

# Bind mounts (resolved_mounts from build_mounts.yml) can't go through the
# Proxmox API build call — the API rejects binding arbitrary host paths.
# They're applied with `pct set` ON the pve node instead. Each entry becomes
#   pct set <vmid> --mpN <host_path>,mp=<mountpoint>[,<opt>=<val>...]
# Set before the container starts so the mounts are present on first boot.
# Idempotent: we read the current config and skip mounts already configured
# with the same value, so re-runs don't report spurious changes.
- name: Read current container config (for mount idempotency)
  ansible.builtin.command:
    cmd: "/usr/sbin/pct config {{ was_built.vmid }}"
  register: pct_current_config
  changed_when: false
  delegate_to: pve
  when: resolved_mounts | default([]) | length > 0

- name: Configure bind mounts on the PVE host
  ansible.builtin.command:
    cmd: >-
      /usr/sbin/pct set {{ was_built.vmid }}
      --{{ item.id }} {{ mount_value }}
  loop: "{{ resolved_mounts | default([]) }}"
  loop_control:
    label: "{{ item.id }} -> {{ item.mountpoint }}"
  delegate_to: pve
  vars:
    # pct mp value: <host_path>,mp=<guest_path>[,opt=val...]. Bind mounts use
    # the host directory directly as the "volume". Extra options (ro, backup,
    # …) come from the catalog entry via build_mounts.yml.
    mount_value: >-
      {{ item.host_path }},mp={{ item.mountpoint }}{% for k, v in (item.options | default({})).items() %},{{ k }}={{ v }}{% endfor %}
  register: pct_set_mounts
  # Only set when the desired "mpN: <value>" line isn't already present in
  # the live config. pct config renders the volume and options on one line.
  changed_when: pct_set_mounts.rc == 0
  when:
    - resolved_mounts | default([]) | length > 0
    - "(item.id ~ ': ' ~ mount_value) not in (pct_current_config.stdout | default(''))"

- name: Add GPU Mappings
  community.proxmox.proxmox:
    node: pve
    api_user: robot@pam
    api_host: 192.168.1.100
    api_token_id: "{{ api_catalog.pve_api.id }}"
    api_token_secret: "{{ api_catalog.pve_api.key }}"
    hostname: '{{ inventory_hostname }}'
    vmid: "{{ was-built.vmid }}"
    features:
      - "nesting=1"
      - "lxc.cgroup2.devices.allow: c 226:128 rwm"
      - "lxc.mount.entry: /dev/dri/renderD128 dev/dri/renderD128 none bind,optional,create=file"
      - 'lxc.hook.pre-start: sh -c \"chown 100000:100993 /dev/dri/renderD128\"'
    state: present
  when: gpu_enabled is true

- name: Start Container
  community.proxmox.proxmox:
    node: pve
    api_user: robot@pam
    api_host: 192.168.1.100
    api_token_id: "{{ api_catalog.pve_api.id }}"
    api_token_secret: "{{ api_catalog.pve_api.key }}"
    hostname: '{{ inventory_hostname }}'
    state: started
  register: was_started

- name: Wait for Container to Become Available
  wait_for:
    host: "{{ ansible_host }}"
    port: 22
    timeout: 30
  delegate_to: localhost
