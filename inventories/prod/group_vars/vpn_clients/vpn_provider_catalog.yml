---
# Gluetun VPN provider catalog (catalog -> enabled framework).
#
# Each entry is a selectable VPN provider/server for the gluetun sidecar.
# A host picks one with:
#   vpn_provider_enabled: <key>
# in its host_vars. Discoverable by frankinception's catalog -> enabled
# framework (key ends in `_catalog`), so VPN selection is manageable from
# the TUI for any host in the `vpn_clients` group.
#
# An entry IS the gluetun provider-specific environment (env var names are
# gluetun's own — see https://github.com/qdm12/gluetun-wiki). Secrets come
# from the vault (vault_*); the plaintext never sits here. Base gluetun env
# (kill switch, outbound subnets, TZ) is added by the docker role, so an
# entry only needs the provider/credentials.
#
# This replaces the old ovpn_server_catalog (which fed the deprecated,
# host-level dl_vpn_client role). Same selection idiom, gluetun env instead
# of an .ovpn file.

vpn_provider_catalog:  # pick one
  ca_toronto:
    # 'custom' = bring-your-own OpenVPN config. gluetun needs the .ovpn for a
    # custom provider; pve_dl writes `custom_ovpn` to <config bind>/gluetun/
    # custom.ovpn at build time, where gluetun auto-loads it.
    VPN_SERVICE_PROVIDER: "custom"
    VPN_TYPE: "openvpn"
    OPENVPN_USER: "{{ vault_ca_toronto_user }}"
    OPENVPN_PASSWORD: "{{ vault_ca_toronto_pass }}"
    OPENVPN_CUSTOM_CONFIG: "/gluetun/custom.ovpn"
    # Full .ovpn text (vault). Consumed by pve_dl's config-write task, NOT
    # passed to gluetun as env — it's stripped out before the env merge.
    custom_ovpn: "{{ vault_ca_toronto_ovpn }}"

  # Private Internet Access — a BUILT-IN gluetun provider. gluetun ships
  # PIA's server list, so there's NO .ovpn file: no custom_ovpn, no
  # OPENVPN_CUSTOM_CONFIG, and the pve_dl file-write/uid-mapping path is
  # skipped entirely (it only fires when OPENVPN_CUSTOM_CONFIG is set). Just
  # credentials + a region.
  pia:
    VPN_SERVICE_PROVIDER: "private internet access"
    VPN_TYPE: "openvpn"
    OPENVPN_USER: "{{ vault_pia_user }}"
    OPENVPN_PASSWORD: "{{ vault_pia_pass }}"
    # Region to connect to (comma-separated list allowed). Adjust as desired;
    # `docker run ... -e VPN_SERVICE_PROVIDER='private internet access' -e
    # SERVER_REGIONS=... ` won't list these, use gluetun's server list docs.
    SERVER_REGIONS: "{{ pia_server_regions | default('CA Toronto') }}"
    # Port forwarding — useful for torrent connectivity. PIA only honours it
    # for P2P. Off by default; flip via host_var if wanted.
    VPN_PORT_FORWARDING: "{{ pia_port_forwarding | default('off') }}"

  # Example of a built-in provider (no .ovpn needed — gluetun ships the
  # server list). Uncomment + add vault creds to use:
  # mullvad_se:
  #   VPN_SERVICE_PROVIDER: "mullvad"
  #   VPN_TYPE: "wireguard"
  #   WIREGUARD_PRIVATE_KEY: "{{ vault_mullvad_wg_key }}"
  #   WIREGUARD_ADDRESSES: "{{ vault_mullvad_wg_addr }}"
  #   SERVER_CITIES: "Stockholm"
