docker_containers_catalog:  # pick many
  npm:
    image: "jc21/nginx-proxy-manager:latest"
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - '{{ droplet_bind_catalog.config.mnt }}/npm/data:/data'
      - '{{ droplet_bind_catalog.config.mnt }}/npm/letsencrypt:/etc/letsencrypt'

  termix:
    image: "ghcr.io/lukegus/termix:latest"
    ports:
      - "8443:8443"
    volumes:
      - '{{ droplet_bind_catalog.config.mnt }}/termix:/app/data'
    env:
      PUID: "1000"
      PGID: "1000"
      ENABLE_SSL: "true"
      SSL_KEY_PATH: "/app/data/ssl/termix.key"
      SSL_CERT_PATH: "/app/data/ssl/termix.crt"
      SSL_PORT: "8443"

  nextcloud:
    image: "lscr.io/linuxserver/nextcloud:latest"
    ports:
      - "8097:8097"
    volumes:
      - '{{ droplet_bind_catalog.config.mnt }}/nextcloud:/config'
    env:
      PUID: "1000"
      PGID: "1000"
      TZ: "america/detroit"

  jellyfin:
    image: "jellyfin/jellyfin:latest"
    ports:
      - "8096:8096"
    volumes:
      - '{{ droplet_bind_catalog.config.mnt }}/jellyfin/config:/config'
      - '{{ droplet_bind_catalog.nott.mnt }}:/cache'
      - '{{ droplet_bind_catalog.media.mnt }}:/media'
    devices:
      - "/dev/dri:/dev/dri"

  ombi:
    image: "linuxserver/ombi:latest"
    ports:
      - "3579:3579"
    volumes:
      - '{{ droplet_bind_catalog.config.mnt }}/ombi:/config'
    env:
      PUID: "1000"
      PGID: "1000"
      TZ: "america/detroit"

  prowlarr:
    image: "linuxserver/prowlarr:latest"
    ports:
      - "9696:9696"
    volumes:
      - '{{ droplet_bind_catalog.config.mnt }}/prowlarr:/config'
    env:
      PUID: "1000"
      PGID: "1000"
      TZ: "america/detroit"

  sonarr:
    image: "linuxserver/sonarr:latest"
    ports:
      - "8989:8989"
    volumes:
      - '{{ droplet_bind_catalog.config.mnt }}/sonarr:/config'
      - '{{ droplet_bind_catalog.media.mnt }}/tv:/tv'
      - '{{ droplet_bind_catalog.media.mnt }}/downloads:/downloads'
    env:
      PUID: "1000"
      PGID: "1000"
      TZ: "america/detroit"

  radarr:
    image: "linuxserver/radarr:latest"
    ports:
      - "7878:7878"
    volumes:
      - '{{ droplet_bind_catalog.config.mnt  }}/radarr:/config'
      - '{{ droplet_bind_catalog.media.mnt }}/movies:/movies'
      - '{{ droplet_bind_catalog.media.mnt }}/downloads:/downloads'
    env:
      PUID: "1000"
      PGID: "1000"
      TZ: "america/detroit"

  lidarr:
    image: "linuxserver/lidarr:latest"
    ports:
      - "8686:8686"
    volumes:
      - '{{ droplet_bind_catalog.config.mnt  }}/lidarr:/config'
      - '{{ droplet_bind_catalog.media.mnt }}/music:/music'
      - '{{ droplet_bind_catalog.media.mnt }}/downloads:/downloads'
    env:
      PUID: "1000"
      PGID: "1000"
      TZ: "america/detroit"

  # -- VPN sidecar (gluetun) -------------------------------------------
  # gluetun builds the VPN tunnel INSIDE this container and other containers
  # route through it via network_mode: "service:gluetun". Replaces the old
  # host-level OpenVPN + nftables kill switch (dl_vpn_client) — gluetun has a
  # built-in kill switch (FIREWALL=on) so a tunnel drop fails closed without
  # any host firewall. Needs /dev/net/tun + NET_ADMIN (so the host LXC must
  # set pct_needs_tun: true). It PUBLISHES the ports of every container that
  # shares its netns — so qbittorrent's web UI + torrent ports live here.
  #
  # Provider/credentials follow the catalog -> enabled pattern: the host sets
  # vpn_provider_enabled: <key> (a vpn_provider_catalog entry in
  # group_vars/vpn_clients), and that entry's gluetun env is merged over the
  # base env below. TUI-manageable; no loose gluetun_* host_vars.
  gluetun:
    image: "qmcgaw/gluetun:latest"
    capabilities:
      - "NET_ADMIN"
    devices:
      - "/dev/net/tun:/dev/net/tun"
    ports:
      - "8080:8080"            # qbittorrent web UI (routed via gluetun)
      - "6881:6881"            # qbittorrent torrent TCP
      - "6881:6881/udp"        # qbittorrent torrent UDP
    volumes:
      - '{{ droplet_bind_catalog.config.mnt }}/gluetun:/gluetun'
    env: >-
      {{
        {
          'FIREWALL': 'on',
          'FIREWALL_OUTBOUND_SUBNETS': vpn_outbound_subnets | default('10.128.0.0/9'),
          'TZ': 'america/detroit'
        }
        | combine(
            (vpn_provider_catalog[vpn_provider_enabled] | default({}, true))
            | dict2items | rejectattr('key', 'eq', 'custom_ovpn') | items2dict
          )
      }}
    restart_policy: "unless-stopped"

  qbittorrent:
    image: "linuxserver/qbittorrent:latest"
    # Route ALL traffic through the gluetun sidecar (shares its netns). With
    # network_mode set, this container publishes NO ports of its own —
    # gluetun publishes them (see above). If gluetun's tunnel drops, qbit
    # has no path out: fail-closed, same guarantee as the old kill switch.
    network_mode: "service:gluetun"
    volumes:
      - '{{ droplet_bind_catalog.config.mnt  }}/qbittorrent:/config'
      - '{{ droplet_bind_catalog.media.mnt  }}/downloads:/downloads'
    env:
      PUID: "1000"
      PGID: "1000"
      TZ: "america/detroit"
      WEBGUI_PORT: "8080"
      TORRENTING_PORT: "6881"

  # -- Observability stack (deployed to Mollymauk) ---------------------
  # Loki: central log store. Unauthenticated by design, so it is published
  # ONLY on the OOB interface (10.128.0.0/9) — never 0.0.0.0. The config is
  # rendered by dl_log_srv onto the config bind; chunks live on the Nott
  # bind. The pve_fw 'logserver' profile also restricts :3100 to OOB.
  loki:
    image: "grafana/loki:3.2.1"
    command: "-config.file=/etc/loki/loki-config.yaml"
    ports:
      # Bind to the OOB self-IP only. Mollymauk pins its OOB NIC static, so
      # this is a literal, predictable address.
      - "10.128.0.5:3100:3100"
    volumes:
      - '{{ droplet_bind_catalog.config.mnt }}/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro'
      - '{{ droplet_bind_catalog.nott.mnt }}/loki:/loki'
    restart_policy: "unless-stopped"

  # Grafana: the single pane. Has its own login. Published on OOB; front
  # with NPM later if you want remote access. Datasource (Loki) is
  # provisioned automatically by dl_log_srv.
  grafana:
    image: "grafana/grafana:11.3.0"
    ports:
      - "10.128.0.5:3000:3000"
    volumes:
      - '{{ droplet_bind_catalog.config.mnt }}/grafana/provisioning:/etc/grafana/provisioning'
      - '{{ droplet_bind_catalog.config.mnt }}/grafana/data:/var/lib/grafana'
    env:
      GF_SECURITY_ADMIN_USER: "{{ log_srv_grafana_admin_user | default('admin') }}"
      GF_SECURITY_ADMIN_PASSWORD: "{{ log_srv_grafana_admin_password | default('admin') }}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    restart_policy: "unless-stopped"

  # -- Identity / SSO stack (deployed to Orthax) -----------------------
  # Authelia: auth/SSO + authorization gateway. NPM forward-auths to it.
  # Config + user DB + SQLite (TOTP secrets) come from dl_auth_srv on the
  # config bind. Published on the OOB anchor; the public path is via NPM.
  authelia:
    image: "authelia/authelia:4.39"
    ports:
      - "10.128.0.4:9091:9091"
    volumes:
      - '{{ droplet_bind_catalog.config.mnt }}/authelia:/config'
    env:
      TZ: "america/detroit"
    restart_policy: "unless-stopped"

  # Redis: Authelia session store. Password-protected (matches the password
  # dl_auth_srv renders into Authelia's config). Persists to the config bind
  # so sessions survive a container recreate.
  redis:
    image: "redis:7-alpine"
    command: "redis-server --requirepass {{ auth_srv_redis_password | default('') }} --appendonly yes"
    ports:
      - "10.128.0.4:6379:6379"
    volumes:
      - '{{ droplet_bind_catalog.config.mnt }}/redis:/data'
    restart_policy: "unless-stopped"

  # LLDAP: lightweight directory + web UI. The user store behind Authelia.
  # Fully env-configured (no config file). LDAP on 3890, web UI on 17170,
  # both published on the OOB anchor only. Data (SQLite directory) persists
  # on the config bind.
  lldap:
    image: "lldap/lldap:stable"
    ports:
      - "10.128.0.4:3890:3890"
      - "10.128.0.4:17170:17170"
    volumes:
      - '{{ droplet_bind_catalog.config.mnt }}/lldap:/data'
    env:
      UID: "1000"
      GID: "1000"
      TZ: "america/detroit"
      LLDAP_JWT_SECRET: "{{ ldap_srv_jwt_secret | default('') }}"
      LLDAP_KEY_SEED: "{{ ldap_srv_key_seed | default('') }}"
      LLDAP_LDAP_BASE_DN: "{{ ldap_srv_base_dn | default('dc=frankenas,dc=com') }}"
      # Initial admin (web UI) password. Change in the UI after first boot if
      # desired; keep in sync with vault otherwise.
      LLDAP_LDAP_USER_PASS: "{{ ldap_srv_admin_password | default('') }}"
    restart_policy: "unless-stopped"


docker_groups_catalog:  # pick many
  piracy:
    gluetun:
    radarr:
    lidarr:
    sonarr:
    prowlarr:
    qbittorrent:

  proxys:
    npm:

  observability:
    loki:
    grafana:

  identity:
    authelia:
    redis:
    lldap:

  public:
    jellyfin:
    npm:
    ombi:
    termix:
    nextcloud:

  testing:
    radarr:
    sonarr:
    termix:
